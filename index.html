<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>日本修士募集要项检索系统</title>
<link rel="stylesheet" href="assets/styles.css" />
</head>
<body>
<div class="page">
  <div class="hero">
    <h1>日本修士募集要项检索系统</h1>
    <p>输入学校或专业方向后，系统会先推荐相关院校；点击院校卡片进入学校页面，再按匹配度查看具体研究科、专业方向、考试内容和 PDF 资料。</p>
  </div>

  <div class="stats">
    <div class="stat">院校 <strong id="schoolCount">0</strong> 所</div>
    <div class="stat">项目 <strong id="itemCount">0</strong> 条</div>
    <div class="stat">PDF资料 <strong id="pdfCount">0</strong> 份</div>
    <div class="stat">资料目录 <strong>全专业募集要项</strong></div>
  </div>

  <div class="panel">
    <div class="search-row">
      <input id="searchInput" type="text" placeholder="输入专业：机械 / 材料 / 电气电子 / 情报工学 / AI / 数据科学 / 建筑 / 土木 / 半导体" />
      <button class="primary-btn" id="searchBtn">搜索</button>
      <button class="secondary-btn" id="resetBtn">重置</button>
    </div>
    <div class="hint">说明：例如输入“东北”会推荐东北大学；输入“经济”“机械”“法学”等专业词，会推荐有关联的院校。</div>
  </div>

  <div class="panel ai-panel">
    <div class="panel-head">
      <div>
        <h2>AI 智能推荐</h2>
        <p>填写语言、专业、地区和难度偏好，系统会按“匹配度 + 通过可能性”推荐院校和专业。</p>
      </div>
      <button class="primary-btn" id="recommendBtn">生成推荐</button>
    </div>
    <div class="recommend-grid">
      <label>
        专业方向
        <input id="recMajor" type="text" placeholder="例：经济 / 机械 / 计算机；没要求可留空" />
      </label>
      <label>
        专业要求
        <select id="recFlex">
          <option value="strict">专业匹配优先</option>
          <option value="flexible">有学上就行，可接受相关专业</option>
        </select>
      </label>
      <label>
        日语能力
        <select id="recJapanese">
          <option value="high">N1 或日语面试交流较强</option>
          <option value="mid">N2 左右，能基本交流</option>
          <option value="low">日语较弱</option>
        </select>
      </label>
      <label>
        英语成绩
        <select id="recEnglish">
          <option value="high">TOEIC 730+ / TOEFL 80+ / IELTS 6.0+</option>
          <option value="mid">TOEIC 550-729 / TOEFL 60-79</option>
          <option value="low">暂无或较低</option>
        </select>
      </label>
      <label>
        面试交流
        <select id="recInterview">
          <option value="high">日语/英语都能说明研究计划</option>
          <option value="mid">能完成基础问答</option>
          <option value="low">面试表达较弱</option>
        </select>
      </label>
      <label>
        地理位置
        <select id="recRegion">
          <option value="any">不限地区</option>
          <option value="tokyo">东京圈</option>
          <option value="kansai">关西</option>
          <option value="hokkaido-tohoku">北海道 / 东北</option>
          <option value="chubu">中部</option>
          <option value="chugoku-shikoku">中国 / 四国</option>
          <option value="kyushu">九州 / 冲绳</option>
        </select>
      </label>
      <label>
        难度偏好
        <select id="recDifficulty">
          <option value="balanced">均衡推荐</option>
          <option value="safe">稳妥优先</option>
          <option value="challenge">冲刺优先</option>
        </select>
      </label>
      <label class="wide-field">
        背景补充
        <textarea id="recBackground" rows="4" placeholder="例：本科经济学，N2，TOEIC 650，想去东京或关西，专业不严格，只想提高合格率。也可以写预算、研究兴趣、是否能接受英文项目等。"></textarea>
      </label>
    </div>
    <div class="hint" id="aiStatus">未配置 GPT 后端时，会使用本地数据库规则推荐；配置后会先让 GPT 理解背景再排序。</div>
  </div>

  <div class="results-head">
    <h2>检索结果</h2>
    <span class="badge" id="resultCount">0 条</span>
  </div>

  <div class="result-list" id="resultList"></div>
</div>

<div class="modal-backdrop" id="schoolModal" aria-hidden="true">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-head">
      <div>
        <h3 id="modalTitle"></h3>
        <p id="modalSubtitle"></p>
      </div>
      <button class="close-btn" id="modalClose" aria-label="关闭">×</button>
    </div>
    <div class="modal-search">
      <input id="modalSearchInput" type="text" placeholder="在这所学校内搜索专业：法学 / 机械 / 经济 / TOEFL" />
      <button class="secondary-btn" id="modalSearchReset">清空</button>
    </div>
    <div id="modalResources"></div>
    <div id="modalBody"></div>
  </div>
</div>
<script src="assets/index-data.js"></script>
<script src="assets/new-schools-data.js"></script>
<script src="assets/config.js"></script>
<script src="assets/app.js"></script>
</body>
</html>
