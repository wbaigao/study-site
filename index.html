<input type="checkbox" id="noEnglish"> 不需要英语成绩

<button onclick="filter()">筛选</button>

<div id="list"></div>

<script>
const data = [
  {name:"东京大学", english:false, japanese:true},
  {name:"早稻田", english:true, japanese:true}
];

function filter(){
  const noEnglish = document.getElementById("noEnglish").checked;
  const list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach(s => {
    if(noEnglish && s.english) return;

    list.innerHTML += "<p>" + s.name + "</p>";
  });
}
</script>
<div id="list"></div>

<script>
fetch('data.json')
  .then(res => res.json())
  .then(data => {
    const list = document.getElementById('list');

    data.forEach(item => {
      list.innerHTML += `
        <div>
          <h2>${item.university} - ${item.program}</h2>
          <p>截止时间：${item.deadline}</p>
        </div>
      `;
    });
  });
</script>
