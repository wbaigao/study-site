<body>
<div class="page">
  <div class="hero">
    <h1>日本修士募集要项检索系统</h1>
    <p>这版把工科和计算机相关项目合并在一起了，并且按<strong>学校</strong>来展示。点某个学校时，会直接显示这所学校当前收录的全部专业信息；不再以研究科作为第一层。筛选条件只保留 <strong>需要英语成绩</strong> 和 <strong>需要日语能力</strong>。</p>
  </div>

  <div class="stats">
    <div class="stat">院校 <strong id="schoolCount">0</strong> 所</div>
    <div class="stat">项目 <strong id="itemCount">0</strong> 条</div>
    <div class="stat">资料目录 <strong>工学募集要项</strong></div>
  </div>

  <div class="panel">
    <div class="search-row">
      <input id="searchInput" type="text" placeholder="例如：机械 / 材料 / 电气电子 / 情报工学 / AI / 数据科学 / 建筑 / 土木 / TOEFL / 口试" />
      <button class="primary-btn" id="searchBtn">搜索</button>
      <button class="secondary-btn" id="resetBtn">重置</button>
    </div>

    <div class="section-title">快速搜索</div>
    <div class="row" id="quickRow"></div>

    <div class="section-title" style="margin-top:16px;">院校</div>
    <div class="row" id="schoolTabs"></div>

    <div class="section-title" style="margin-top:16px;">筛选条件</div>
    <div class="row">
      <span class="chip" data-filter="english">需要英语成绩</span>
      <span class="chip" data-filter="japanese">需要日语能力</span>
    </div>

    <div class="hint">说明：院校栏是单选查看。点学校后会展示该校当前收录的全部工科和计算机专业信息；点“全部”可回到总表。</div>
  </div>

  <div class="results-head">
    <h2>检索结果</h2>
    <span class="badge" id="resultCount">0 条</span>
  </div>

  <div class="result-list" id="resultList"></div>
</div>

  return [...new Map(DATA.map(item => [item.key, item.university])).entries()]
    .map(([key, university]) => ({ key, university }));
}

function scoreItem(item, keyword) {
  if (!keyword) return 1;
  const q = keyword.toLowerCase().trim();
  const pool = [
    item.university,
    item.category,
    item.title,
    item.apply,
    item.exam,
    item.englishNote,
    item.japaneseNote,
    item.examSubjects,
    item.note,
    ...(item.directions || [])
  ].join(" ").toLowerCase();
  if (!pool.includes(q)) return 0;
  let score = 10;
  if ((item.title || "").toLowerCase().includes(q)) score += 8;
  if ((item.examSubjects || "").toLowerCase().includes(q)) score += 6;
  if ((item.university || "").toLowerCase().includes(q)) score += 4;
  return score;
}

function renderTabs() {
  const tabs = document.getElementById("schoolTabs");
  tabs.innerHTML = "";

  const all = document.createElement("span");
  all.className = "tab" + (currentSchool === "all" ? " active" : "");
  all.textContent = "全部";
  all.onclick = () => {
    currentSchool = "all";
    renderAll();
  };
  tabs.appendChild(all);

  uniqueSchools().forEach(item => {
    const el = document.createElement("span");
    el.className = "tab" + (currentSchool === item.key ? " active" : "");
    el.textContent = item.university;
    el.onclick = () => {
      currentSchool = item.key;
      renderAll();
    };
    tabs.appendChild(el);
  });
}

function renderQuick() {
  const row = document.getElementById("quickRow");
  row.innerHTML = "";
  QUICK.forEach(word => {
    const el = document.createElement("span");
    el.className = "quick-chip";
    el.textContent = word;
    el.onclick = () => {
      document.getElementById("searchInput").value = word;
      renderAll();
    };
    row.appendChild(el);
  });
}

function applyFilters() {
  const keyword = document.getElementById("searchInput").value.trim();

  let list = DATA
    .map(item => ({ ...item, _score: scoreItem(item, keyword) }))
    .filter(item => item._score > 0);

  if (currentSchool !== "all") {
    list = list.filter(item => item.key === currentSchool);
  }
  if (needEnglish) {
    list = list.filter(item => item.englishRequired);
  }
  if (needJapanese) {
    list = list.filter(item => item.japaneseRequired);
  }

  list.sort((a, b) => b._score - a._score || a.university.localeCompare(b.university, "zh-CN"));
  return list;
}

function tag(text, cls) {
  return `<span class="tag ${cls}">${text}</span>`;
}

function renderList(list) {
  const wrap = document.getElementById("resultList");
  document.getElementById("resultCount").textContent = `${list.length} 条`;

  if (!list.length) {
    wrap.innerHTML = `<div class="empty">没有找到匹配结果。<br>可以换关键词，或者切回“全部”院校查看。</div>`;
    return;
  }

  const groups = list.reduce((acc, item) => {
    if (!acc[item.university]) acc[item.university] = [];
    acc[item.university].push(item);
    return acc;
  }, {});

  wrap.innerHTML = Object.entries(groups).map(([university, items]) => {
    const expandedItems = items.flatMap(item =>
      item.directions.map(direction => ({ ...item, majorDirection: direction }))
    );

    const cards = expandedItems.map(item => {
      const scoreText = document.getElementById("searchInput").value.trim() ? `匹配 ${item._score}` : item.category;
      return `
        <div class="item-block">
          <div class="school-head" style="margin-bottom:12px;">
            <div>
              <h4 class="item-title">${item.majorDirection}</h4>
              <p class="item-subtitle">所属条目：${item.title} / 类别：${item.category}</p>
            </div>
            <span class="meta-tag">${scoreText}</span>
          </div>

          <div class="tag-row">
            ${tag(item.category, "tag-purple")}
            ${tag(item.englishRequired ? "需要英语成绩" : "英语成绩未统一要求", item.englishRequired ? "tag-blue" : "tag-amber")}
            ${tag(item.japaneseRequired ? "需要日语能力" : "日语要求相对低/另案", item.japaneseRequired ? "tag-red" : "tag-green")}
          </div>

          <div class="grid">
            <div class="box">
              <strong>出愿时间</strong>
              ${item.apply}
            </div>
            <div class="box">
              <strong>考试时间</strong>
              ${item.exam}
            </div>
            <div class="box">
              <strong>英语要求</strong>
              ${item.englishNote}
            </div>
            <div class="box">
              <strong>日语说明</strong>
              ${item.japaneseNote}
            </div>
          </div>

          <div class="detail">
            <div class="detail-line"><strong>专业课 / 选考方式：</strong>${item.examSubjects}</div>
            <div class="detail-line"><strong>备注：</strong>${item.note}</div>
            <div class="detail-line"><strong>官方入口：</strong><a href="${item.url}" target="_blank" rel="noopener">${item.url}</a></div>
          </div>
        </div>
      `;
    }).join("");

    return `
      <section class="school-group">
        <div class="school-head">
          <div>
            <h3>${university}</h3>
            <p>当前收录 ${expandedItems.length} 条专业信息。这里会把这所学校收录到的全部专业逐条展开显示。</p>
          </div>
          <span class="school-badge">${expandedItems.length} 条</span>
        </div>
        <div class="item-list">${cards}</div>
      </section>
    `;
  }).join("");
}

function renderAll() {
  renderTabs();
  document.querySelectorAll("[data-filter='english']").forEach(el => el.classList.toggle("active", needEnglish));
  document.querySelectorAll("[data-filter='japanese']").forEach(el => el.classList.toggle("active", needJapanese));
  renderList(applyFilters());
}

document.getElementById("searchBtn").addEventListener("click", renderAll);
document.getElementById("resetBtn").addEventListener("click", () => {
  document.getElementById("searchInput").value = "";
  currentSchool = "all";
  needEnglish = false;
  needJapanese = false;
  renderAll();
});
document.getElementById("searchInput").addEventListener("keydown", event => {
  if (event.key === "Enter") renderAll();
});
document.querySelector("[data-filter='english']").addEventListener("click", () => {
  needEnglish = !needEnglish;
  renderAll();
});
document.querySelector("[data-filter='japanese']").addEventListener("click", () => {
  needJapanese = !needJapanese;
  renderAll();
});

document.getElementById("schoolCount").textContent = uniqueSchools().length;
document.getElementById("itemCount").textContent = DATA.length;
renderQuick();
renderAll();
</script>
</body>
</html>
