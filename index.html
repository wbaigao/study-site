<body>
  <div class="container">
    <header class="hero">
      <h1>🎓 日本修士研究科检索系统</h1>
      <p class="subtitle">按研究科整理募集要项，点击后查看该研究科下的专业与考试信息</p>
    </header>

    <section class="panel search-panel">
      <h2>🔎 模糊查询</h2>

      <div class="search-row">
        <div class="field grow">
          <label for="keywordInput">输入关键词</label>
          <input
            id="keywordInput"
            type="text"
            placeholder="例如：工学研究科 / 情報学研究科 / 电气 / 机械 / 名古屋大学"
          />
        </div>

        <div class="action-inline">
          <button id="searchBtn" class="primary-btn" type="button">搜索</button>
          <button id="resetBtn" class="secondary-btn" type="button">重置</button>
        </div>
      </div>

      <div id="searchHint" class="hint">
        可搜索大学名、研究科名、专业方向、考试内容等关键词。
      </div>
    </section>

    <section class="panel">
      <div class="section-head">
        <h2>🏫 研究科列表</h2>
        <span id="resultCount" class="count-badge">加载中...</span>
      </div>
      <div id="schoolList" class="school-grid"></div>
    </section>

    <section id="detailSection" class="panel detail-section hidden">
      <div class="detail-top">
        <button id="backBtn" class="back-btn" type="button">← 返回研究科列表</button>
        <div>
          <h2 id="detailTitle">研究科详情</h2>
          <p id="detailSubtitle" class="subtitle small"></p>
        </div>
      </div>

      <div class="detail-toolbar">
        <div class="field grow">
          <label for="detailKeywordInput">当前研究科内检索</label>
          <input
            id="detailKeywordInput"
            type="text"
            placeholder="搜索专业 / 考试科目 / 要求 / 备注 / 联系方式"
          />
        </div>
      </div>

      <div id="majorList" class="major-list"></div>
    </section>
  </div>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: #f5f7fb;
      color: #1f2937;
    }

    .container {
      max-width: 1120px;
      margin: 0 auto;
      padding: 24px 16px 48px;
    }

    .hero {
      margin-bottom: 20px;
    }

    .hero h1 {
      margin: 0 0 8px;
      font-size: 40px;
      line-height: 1.2;
    }

    .subtitle {
      margin: 0;
      color: #6b7280;
      font-size: 15px;
    }

    .subtitle.small {
      margin-top: 6px;
      font-size: 14px;
    }

    .panel {
      background: #fff;
      border-radius: 18px;
      padding: 20px;
      margin-bottom: 18px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
      border: 1px solid #e5e7eb;
    }

    .panel h2 {
      margin: 0 0 16px;
      font-size: 24px;
    }

    .search-row,
    .detail-toolbar {
      display: flex;
      gap: 12px;
      align-items: end;
      flex-wrap: wrap;
    }

    .field {
      min-width: 220px;
    }

    .field.grow {
      flex: 1;
    }

    .field label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 600;
      color: #374151;
    }

    input,
    button {
      font: inherit;
    }

    input {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      padding: 12px 14px;
      background: #fff;
      color: #111827;
      outline: none;
    }

    input:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.12);
    }

    .action-inline {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .primary-btn,
    .secondary-btn,
    .back-btn {
      border: none;
      border-radius: 12px;
      padding: 12px 16px;
      cursor: pointer;
      font-weight: 600;
      white-space: nowrap;
    }

    .primary-btn {
      background: #4f46e5;
      color: #fff;
    }

    .primary-btn:hover {
      background: #4338ca;
    }

    .secondary-btn,
    .back-btn {
      background: #eef2ff;
      color: #3730a3;
    }

    .secondary-btn:hover,
    .back-btn:hover {
      background: #e0e7ff;
    }

    .hint {
      margin-top: 14px;
      font-size: 14px;
      color: #6b7280;
      line-height: 1.6;
    }

    .section-head,
    .detail-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .count-badge {
      background: #eef2ff;
      color: #4338ca;
      font-size: 13px;
      font-weight: 700;
      padding: 8px 12px;
      border-radius: 999px;
    }

    .school-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 16px;
    }

    .school-card {
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 18px;
      background: linear-gradient(180deg, #ffffff 0%, #fafbff 100%);
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
      cursor: pointer;
    }

    .school-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 18px rgba(79, 70, 229, 0.08);
      border-color: #c7d2fe;
    }

    .school-card h3 {
      margin: 0 0 8px;
      font-size: 22px;
      line-height: 1.35;
    }

    .school-card p {
      margin: 0;
      color: #6b7280;
      font-size: 14px;
      line-height: 1.6;
    }

    .school-meta {
      margin-top: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .school-tag {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      background: #f3f4f6;
      color: #374151;
      font-size: 12px;
      font-weight: 600;
    }

    .open-text {
      color: #4f46e5;
      font-size: 13px;
      font-weight: 700;
    }

    .hidden {
      display: none;
    }

    .major-list {
      display: grid;
      gap: 14px;
      margin-top: 16px;
    }

    .major-card {
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 18px;
      background: #fff;
      box-shadow: 0 4px 14px rgba(15, 23, 42, 0.04);
    }

    .major-title {
      margin: 0 0 8px;
      font-size: 20px;
      line-height: 1.4;
    }

    .major-subtitle {
      margin: 0 0 14px;
      font-size: 14px;
      color: #6b7280;
    }

    .info-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }

    .info-box {
      background: #f9fafb;
      border: 1px solid #eef2f7;
      border-radius: 12px;
      padding: 12px;
      font-size: 14px;
      line-height: 1.6;
    }

    .info-box strong {
      display: block;
      margin-bottom: 6px;
      color: #111827;
    }

    .tag-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .tag {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }

    .tag-blue {
      background: #dbeafe;
      color: #1d4ed8;
    }

    .tag-gray {
      background: #f3f4f6;
      color: #4b5563;
    }

    .content-block {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px dashed #e5e7eb;
    }

    .content-block h4 {
      margin: 0 0 8px;
      font-size: 15px;
    }

    .content-block p {
      margin: 0;
      line-height: 1.7;
      color: #374151;
      font-size: 14px;
      white-space: pre-wrap;
    }

    .contact-list {
      margin: 0;
      padding-left: 18px;
      color: #374151;
      line-height: 1.8;
      font-size: 14px;
    }

    .contact-list a {
      color: #4f46e5;
      text-decoration: none;
      word-break: break-all;
    }

    .contact-list a:hover {
      text-decoration: underline;
    }

    .empty-box,
    .error-box {
      padding: 18px 16px;
      text-align: left;
      border-radius: 14px;
      line-height: 1.7;
    }

    .empty-box {
      color: #6b7280;
      background: #f9fafb;
      border: 1px dashed #d1d5db;
    }

    .error-box {
      color: #991b1b;
      background: #fef2f2;
      border: 1px solid #fecaca;
    }

    code {
      background: #f3f4f6;
      padding: 2px 6px;
      border-radius: 6px;
      font-size: 0.95em;
    }

    @media (max-width: 768px) {
      .hero h1 {
        font-size: 30px;
      }

      .search-row,
      .detail-toolbar {
        flex-direction: column;
        align-items: stretch;
      }

      .action-inline {
        width: 100%;
      }

      .action-inline button {
        flex: 1;
      }

      .info-row {
        grid-template-columns: 1fr;
      }

      .school-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>

  <script>
    let graduateSchoolsData = [];
    let currentGraduateSchoolData = null;

    const schoolListEl = document.getElementById("schoolList");
    const resultCountEl = document.getElementById("resultCount");
    const searchHintEl = document.getElementById("searchHint");
    const keywordInputEl = document.getElementById("keywordInput");
    const detailSectionEl = document.getElementById("detailSection");
    const detailTitleEl = document.getElementById("detailTitle");
    const detailSubtitleEl = document.getElementById("detailSubtitle");
    const detailKeywordInputEl = document.getElementById("detailKeywordInput");
    const majorListEl = document.getElementById("majorList");

    async function loadGraduateSchools() {
      try {
        const res = await fetch("data/graduate-schools.json?v=" + Date.now());
        if (!res.ok) {
          throw new Error("无法读取 data/graduate-schools.json，状态码：" + res.status);
        }

        const data = await res.json();

        if (!Array.isArray(data)) {
          throw new Error("graduate-schools.json 的最外层必须是数组 []");
        }

        graduateSchoolsData = data;
        renderGraduateSchoolCards(graduateSchoolsData);
        searchHintEl.textContent = "可搜索大学名、研究科名、专业方向、考试内容等关键词。";
      } catch (err) {
        resultCountEl.textContent = "加载失败";
        schoolListEl.innerHTML = `
          <div class="error-box">
            <strong>研究科列表加载失败</strong><br>
            ${escapeHtml(err.message)}<br><br>
            请检查：<br>
            1. <code>data/graduate-schools.json</code> 是否存在<br>
            2. JSON 是否为数组格式<br>
            3. 每条数据是否包含 <code>id</code>、<code>university</code>、<code>graduate_school</code>
          </div>
        `;
        console.error(err);
      }
    }

    function renderGraduateSchoolCards(data) {
      schoolListEl.innerHTML = "";

      if (!data.length) {
        resultCountEl.textContent = "0 个研究科";
        schoolListEl.innerHTML = '<div class="empty-box">没有找到匹配研究科，请换个关键词试试。</div>';
        return;
      }

      resultCountEl.textContent = `${data.length} 个研究科`;

      data.forEach((item) => {
        const title = item.name || `${item.university || ""} ${item.graduate_school || ""}`.trim();
        const desc = item.desc || "点击查看该研究科下的专业与考试信息";

        const card = document.createElement("div");
        card.className = "school-card";
        card.innerHTML = `
          <h3>${escapeHtml(title)}</h3>
          <p>${escapeHtml(item.university || "")}</p>
          <p>${escapeHtml(item.graduate_school || "")}</p>
          <p style="margin-top:8px;">${escapeHtml(desc)}</p>
          <div class="school-meta">
            <span class="school-tag">研究科</span>
            <span class="open-text">查看专业 →</span>
          </div>
        `;

        card.addEventListener("click", () => openGraduateSchool(item));
        schoolListEl.appendChild(card);
      });
    }

    async function openGraduateSchool(item) {
      const id = item.id;
      const title = item.name || `${item.university || ""} ${item.graduate_school || ""}`.trim();
      const subtitle = item.desc || "该研究科下的专业与考试信息";

      detailSectionEl.classList.remove("hidden");
      detailTitleEl.textContent = title;
      detailSubtitleEl.textContent = subtitle;
      majorListEl.innerHTML = '<div class="empty-box">正在加载研究科详情...</div>';
      detailKeywordInputEl.value = "";

      try {
        const res = await fetch(`data/${id}.json?v=` + Date.now());
        if (!res.ok) {
          throw new Error(`无法读取 data/${id}.json，状态码：${res.status}`);
        }

        const data = await res.json();

        if (!data || typeof data !== "object") {
          throw new Error(`${id}.json 必须是对象格式`);
        }

        if (!Array.isArray(data.majors)) {
          throw new Error(`${id}.json 中必须存在 majors 数组`);
        }

        currentGraduateSchoolData = data;
        renderMajorList(currentGraduateSchoolData);
        detailSectionEl.scrollIntoView({ behavior: "smooth", block: "start" });
      } catch (err) {
        majorListEl.innerHTML = `
          <div class="error-box">
            <strong>研究科详情加载失败</strong><br>
            ${escapeHtml(err.message)}<br><br>
            当前文件：<code>data/${escapeHtml(id)}.json</code>
          </div>
        `;
        console.error(err);
      }
    }

    function renderMajorList(data) {
      majorListEl.innerHTML = "";

      if (!data || !Array.isArray(data.majors) || !data.majors.length) {
        majorListEl.innerHTML = '<div class="empty-box">当前研究科下暂无专业数据。</div>';
        return;
      }

      data.majors.forEach((item) => {
        const title =
          item.major_name ||
          [item.major, item.course].filter(Boolean).join(" · ") ||
          "未填写";

        const degree =
          item.degree || data.degree || "未填写";

        const language =
          item.language || "未填写";

        const applicationPeriod =
          item.application_period ||
          ([item.apply_start, item.apply_end].filter(Boolean).join(" ~ ")) ||
          ([data.apply_start, data.apply_end].filter(Boolean).join(" ~ ")) ||
          "未填写";

        const examDate =
          item.exam_date ||
          ([item.exam_start, item.exam_end].filter(Boolean).join(" ~ ")) ||
          ([data.exam_start, data.exam_end].filter(Boolean).join(" ~ ")) ||
          "未填写";

        const tuition =
          item.tuition || data.tuition || "未填写";

        const applicationFee =
          item.application_fee || data.application_fee || "未填写";

        const englishText =
          item.english_requirement ||
          (Array.isArray(item.english_tests) && item.english_tests.length
            ? item.english_tests.join(" / ")
            : "英语要求未写明");

        const requirements =
          item.requirements || "未填写";

        const notes =
          item.notes || data.notes || "未填写";

        const examSubjects =
          item.exam_subjects || item.exam_content || "未填写";

        const contactItems = [];

        if (Array.isArray(item.contacts) && item.contacts.length) {
          item.contacts.forEach(link => {
            contactItems.push(
              `<li><a href="${escapeAttr(link)}" target="_blank" rel="noopener noreferrer">${escapeHtml(link)}</a></li>`
            );
          });
        } else {
          if (item.contact_name || data.contact_name) {
            contactItems.push(`<li>联系人：${escapeHtml(item.contact_name || data.contact_name)}</li>`);
          }
          if (item.contact_phone || data.contact_phone) {
            contactItems.push(`<li>电话：${escapeHtml(item.contact_phone || data.contact_phone)}</li>`);
          }
          if (item.contact_email || data.contact_email) {
            contactItems.push(`<li>邮箱：${escapeHtml(item.contact_email || data.contact_email)}</li>`);
          }
          const url = item.contact_url || data.contact_url;
          if (url) {
            contactItems.push(
              `<li>链接：<a href="${escapeAttr(url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(url)}</a></li>`
            );
          }
        }

        const contactHtml = contactItems.length ? contactItems.join("") : "<li>未填写</li>";

        const card = document.createElement("div");
        card.className = "major-card";
        card.innerHTML = `
          <h3 class="major-title">${escapeHtml(title)}</h3>
          <p class="major-subtitle">${escapeHtml(data.name || "")}</p>

          <div class="info-row">
            <div class="info-box">
              <strong>学位</strong>
              ${escapeHtml(degree)}
            </div>
            <div class="info-box">
              <strong>授课语言</strong>
              ${escapeHtml(language)}
            </div>
            <div class="info-box">
              <strong>出愿时间</strong>
              ${escapeHtml(applicationPeriod)}
            </div>
            <div class="info-box">
              <strong>考试时间</strong>
              ${escapeHtml(examDate)}
            </div>
          </div>

          <div class="info-row">
            <div class="info-box">
              <strong>学费</strong>
              ${escapeHtml(tuition)}
            </div>
            <div class="info-box">
              <strong>检定料</strong>
              ${escapeHtml(applicationFee)}
            </div>
          </div>

          <div class="tag-row">
            <span class="tag tag-blue">${escapeHtml(englishText)}</span>
          </div>

          <div class="content-block">
            <h4>考试科目 / 内容</h4>
            <p>${escapeHtml(examSubjects)}</p>
          </div>

          <div class="content-block">
            <h4>申请要求</h4>
            <p>${escapeHtml(requirements)}</p>
          </div>

          <div class="content-block">
            <h4>备注</h4>
            <p>${escapeHtml(notes)}</p>
          </div>

          <div class="content-block">
            <h4>联系方式 / 链接</h4>
            <ul class="contact-list">
              ${contactHtml}
            </ul>
          </div>
        `;

        majorListEl.appendChild(card);
      });
    }

    function runSearch() {
      const keyword = keywordInputEl.value.trim().toLowerCase();

      if (!keyword) {
        renderGraduateSchoolCards(graduateSchoolsData);
        searchHintEl.textContent = "可搜索大学名、研究科名、专业方向、考试内容等关键词。";
        return;
      }

      const filtered = graduateSchoolsData.filter(item => {
        const text = [
          item.id,
          item.name,
          item.university,
          item.graduate_school,
          item.desc,
          ...(Array.isArray(item.tags) ? item.tags : [])
        ]
          .filter(Boolean)
          .join(" ")
          .toLowerCase();

        return text.includes(keyword);
      });

      renderGraduateSchoolCards(filtered);
      searchHintEl.textContent = filtered.length
        ? `找到 ${filtered.length} 个匹配研究科。`
        : "没有找到匹配研究科，请换个关键词试试。";
    }

    function resetSearch() {
      keywordInputEl.value = "";
      renderGraduateSchoolCards(graduateSchoolsData);
      searchHintEl.textContent = "可搜索大学名、研究科名、专业方向、考试内容等关键词。";
    }

    function filterCurrentGraduateSchool() {
      const keyword = detailKeywordInputEl.value.trim().toLowerCase();

      if (!currentGraduateSchoolData) return;

      if (!keyword) {
        renderMajorList(currentGraduateSchoolData);
        return;
      }

      const filteredMajors = currentGraduateSchoolData.majors.filter(item => {
        const text = [
          item.major_name,
          item.major,
          item.course,
          item.degree,
          item.language,
          item.exam_subjects,
          item.exam_content,
          item.application_period,
          item.apply_start,
          item.apply_end,
          item.exam_date,
          item.exam_start,
          item.exam_end,
          item.tuition,
          item.application_fee,
          item.requirements,
          item.english_requirement,
          ...(Array.isArray(item.english_tests) ? item.english_tests : []),
          item.notes,
          item.contact_name,
          item.contact_phone,
          item.contact_email,
          item.contact_url,
          ...(Array.isArray(item.contacts) ? item.contacts : [])
        ]
          .filter(Boolean)
          .join(" ")
          .toLowerCase();

        return text.includes(keyword);
      });

      renderMajorList({
        ...currentGraduateSchoolData,
        majors: filteredMajors
      });
    }

    function backToList() {
      detailSectionEl.classList.add("hidden");
      majorListEl.innerHTML = "";
      detailKeywordInputEl.value = "";
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function escapeAttr(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/"/g, "&quot;");
    }

    document.getElementById("searchBtn").addEventListener("click", runSearch);
    document.getElementById("resetBtn").addEventListener("click", resetSearch);
    document.getElementById("backBtn").addEventListener("click", backToList);

    keywordInputEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter") runSearch();
    });

    detailKeywordInputEl.addEventListener("input", filterCurrentGraduateSchool);

    loadGraduateSchools();
  </script>
</body>
