<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>日本大学院 理工类修士检索推荐系统</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f8f7fc;
    --surface: #ffffff;
    --surface2: #f3f2f8;
    --border: rgba(0,0,0,0.08);
    --text: #1a1825;
    --text2: #5c5870;
    --text3: #9590aa;
    --purple: #534ab7;
    --purple-light: #eeedfe;
    --purple-dark: #3c3489;
    --teal: #0f6e56;
    --teal-light: #e1f5ee;
    --amber: #633806;
    --amber-light: #faeeda;
    --red: #8a2e2e;
    --red-light: #fcebec;
    --blue: #0c447c;
    --blue-light: #e6f1fb;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic UI", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
  }
  .page {
    max-width: 1100px;
    margin: 0 auto;
    padding: 32px 16px 64px;
  }
  .hero {
    margin-bottom: 20px;
  }
  .hero-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
    flex-wrap: wrap;
  }
  .hero h1 {
    font-size: 28px;
    font-weight: 700;
  }
  .ai-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    font-weight: 700;
    background: var(--purple-light);
    color: var(--purple-dark);
    padding: 4px 9px;
    border-radius: 999px;
  }
  .hero p {
    font-size: 14px;
    color: var(--text2);
  }
  .stats-bar {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .stat-pill {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    font-weight: 500;
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 6px 12px;
    border-radius: 999px;
    color: var(--text2);
  }
  .stat-pill span {
    font-size: 15px;
    font-weight: 700;
    color: var(--purple);
  }
  .search-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 20px 22px;
    margin-bottom: 18px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.04);
  }
  .search-row {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
  }
  .search-input {
    flex: 1;
    font-size: 15px;
    font-family: inherit;
    padding: 12px 16px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    outline: none;
  }
  .search-input:focus {
    background: var(--surface);
    border-color: #a79ff3;
    box-shadow: 0 0 0 3px rgba(83,74,183,0.12);
  }
  .btn {
    padding: 12px 18px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    font-size: 14px;
    font-family: inherit;
    font-weight: 600;
    white-space: nowrap;
  }
  .btn:hover { background: var(--surface2); }
  .btn-primary {
    background: var(--purple);
    border-color: var(--purple);
    color: #fff;
  }
  .btn-primary:hover { background: var(--purple-dark); }
  .quick-row, .filter-row {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
  }
  .quick-row { margin-bottom: 14px; }
  .quick-label, .filter-label {
    font-size: 12px;
    color: var(--text3);
  }
  .quick-btn, .pill, .univ-tab {
    font-family: inherit;
    font-size: 12px;
    padding: 5px 11px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text2);
    cursor: pointer;
  }
  .quick-btn {
    border-color: #c7c2ff;
    background: var(--purple-light);
    color: var(--purple-dark);
  }
  .pill.on {
    background: var(--purple-light);
    border-color: #b9b1ff;
    color: var(--purple-dark);
    font-weight: 700;
  }
  .pill.on-teal {
    background: var(--teal-light);
    border-color: #8fdcc0;
    color: var(--teal);
    font-weight: 700;
  }
  .divider {
    height: 1px;
    background: var(--border);
    margin: 14px 0;
  }
  .filters {
    display: grid;
    gap: 12px;
  }
  .toggle-label {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    color: var(--text2);
    cursor: pointer;
  }
  .toggle-label input {
    accent-color: var(--purple);
  }
  .loading-row {
    display: none;
    font-size: 13px;
    color: var(--text3);
    margin: 8px 0 12px;
  }
  .loading-row.show { display: block; }
  .results-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
    gap: 10px;
  }
  .results-header h2 {
    font-size: 16px;
    font-weight: 700;
  }
  .count-badge {
    font-size: 12px;
    color: var(--text2);
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 4px 10px;
    border-radius: 999px;
  }
  .results-list {
    display: grid;
    gap: 12px;
  }
  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 4px solid #dad8e8;
    border-radius: 16px;
    padding: 16px 18px;
    cursor: pointer;
    transition: box-shadow 0.15s ease, transform 0.15s ease;
  }
  .result-card:hover {
    box-shadow: 0 8px 24px rgba(83,74,183,0.08);
    transform: translateY(-1px);
  }
  .card-head {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 10px;
  }
  .card-major {
    font-size: 17px;
    font-weight: 700;
    line-height: 1.4;
  }
  .card-univ {
    font-size: 12px;
    color: var(--text3);
    margin-top: 4px;
  }
  .card-univ-badge {
    display: inline-block;
    font-size: 11px;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 999px;
    margin-left: 6px;
    vertical-align: middle;
  }
  .relevance-badge {
    flex-shrink: 0;
    font-size: 12px;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 999px;
  }
  .rel-high { background: var(--purple-light); color: var(--purple-dark); }
  .rel-mid  { background: var(--teal-light); color: var(--teal); }
  .rel-low  { background: var(--blue-light); color: var(--blue); }
  .card-tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    margin-bottom: 12px;
  }
  .ctag {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text2);
  }
  .ctag-jp { background: var(--amber-light); border-color: #f2c46d; color: var(--amber); }
  .ctag-ok { background: var(--teal-light); border-color: #93dbbf; color: var(--teal); }
  .ctag-ng { background: var(--red-light); border-color: #efc0c3; color: var(--red); }
  .ctag-info { background: var(--blue-light); border-color: #b6d7f1; color: var(--blue); }
  .meta-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 10px;
    margin-bottom: 12px;
  }
  .meta-box {
    background: var(--surface2);
    border: 1px solid #ece8f7;
    border-radius: 12px;
    padding: 10px 12px;
    font-size: 13px;
    color: var(--text2);
  }
  .meta-box strong {
    display: block;
    font-size: 12px;
    color: var(--text);
    margin-bottom: 4px;
  }
  .summary-line {
    font-size: 13px;
    color: var(--text2);
    margin-bottom: 6px;
  }
  .summary-line strong {
    color: var(--text);
    font-weight: 700;
  }
  .detail-drawer {
    overflow: hidden;
    max-height: 0;
    transition: max-height 0.25s ease;
    border-top: 1px solid transparent;
  }
  .detail-drawer.open {
    max-height: 900px;
    border-top: 1px solid var(--border);
    margin-top: 12px;
    padding-top: 12px;
  }
  .detail-inner {
    display: grid;
    gap: 8px;
  }
  .detail-row {
    display: flex;
    gap: 10px;
    font-size: 13px;
    align-items: flex-start;
  }
  .detail-key {
    min-width: 86px;
    color: var(--text);
    font-weight: 700;
    flex-shrink: 0;
  }
  .detail-val {
    color: var(--text2);
    line-height: 1.7;
  }
  .detail-val a {
    color: var(--purple);
    text-decoration: none;
    word-break: break-all;
  }
  .detail-val a:hover { text-decoration: underline; }
  .empty {
    text-align: center;
    padding: 48px 0;
    color: var(--text3);
    font-size: 14px;
    line-height: 1.8;
  }
  @media (max-width: 720px) {
    .search-row { flex-direction: column; }
    .meta-grid { grid-template-columns: 1fr; }
    .card-head { flex-direction: column; }
    .hero h1 { font-size: 24px; }
  }
</style>
</head>
<body>
<div class="page">
  <div class="hero">
    <div class="hero-row">
      <h1>🎓 日本大学院 理工类修士推荐系统</h1>
      <span class="ai-badge">✦ 语义相关度分析</span>
    </div>
    <p>支持中文 / 日文 / 英文混合搜索。按专业方向、考试科目、英语要求、选拔方式做匹配推荐，点开卡片可继续看考试内容和官网入口。</p>
  </div>

  <div class="stats-bar">
    <div class="stat-pill">院校 <span id="univCount">-</span> 所</div>
    <div class="stat-pill">项目 <span id="totalCount">-</span> 条</div>
    <div class="stat-pill">覆盖 <span id="fieldCount">理工类硕士</span></div>
  </div>

  <div class="search-card">
    <div class="search-row">
      <input class="search-input" id="queryInput" placeholder="例：机械工学、材料、电气电子、建筑、情报、化学工学、原子力、控制..." onkeydown="if(event.key==='Enter') doSearch()" />
      <button class="btn btn-primary" onclick="doSearch()">✦ 推荐</button>
      <button class="btn" onclick="resetAll()">重置</button>
    </div>

    <div class="quick-row">
      <span class="quick-label">快速搜索：</span>
      <button class="quick-btn" onclick="qs('機械工学')">機械工学</button>
      <button class="quick-btn" onclick="qs('材料科学')">材料科学</button>
      <button class="quick-btn" onclick="qs('電気電子')">電気電子</button>
      <button class="quick-btn" onclick="qs('情報通信')">情報通信</button>
      <button class="quick-btn" onclick="qs('建築')">建築</button>
      <button class="quick-btn" onclick="qs('化学工学')">化学工学</button>
      <button class="quick-btn" onclick="qs('応用物理')">応用物理</button>
      <button class="quick-btn" onclick="qs('原子力・量子')">原子力・量子</button>
      <button class="quick-btn" onclick="qs('生命・バイオ')">生命・バイオ</button>
      <button class="quick-btn" onclick="qs('都市・土木')">都市・土木</button>
    </div>

    <div class="divider"></div>

    <div class="filters">
      <div class="filter-row">
        <span class="filter-label">院校</span>
        <div id="univTabs" class="filter-row"></div>
      </div>

      <div class="filter-row">
        <span class="filter-label">英语</span>
        <span class="pill on" id="p-toefl" onclick="tp('toefl')">TOEFL 可</span>
        <span class="pill on" id="p-ielts" onclick="tp('ielts')">IELTS 可</span>
      </div>

      <div class="filter-row">
        <span class="filter-label">条件</span>
        <span class="pill on-teal" id="p-any" onclick="th('any')">不限</span>
        <span class="pill" id="p-461" onclick="th('461')">仅看 TOEIC 461+</span>
        <span class="pill" id="p-550" onclick="th('550')">仅看 TOEIC 550+</span>
        <label class="toggle-label"><input type="checkbox" id="filterNoJP" /> 仅看日语要求相对低</label>
      </div>
    </div>
  </div>

  <div class="loading-row" id="loadingRow">✦ 正在分析语义相关度...</div>

  <div class="results-header">
    <h2>推荐结果</h2>
    <span class="count-badge" id="countBadge">请输入关键词</span>
  </div>
  <div class="results-list" id="resultsList"></div>
</div>

let currentResults = [];
let openCards = new Set();
let filterNoJP = false;
let thresholdState = "any";
let pillState = { toefl: true, ielts: true };
let univState = {};

function uniqUnivs() {
  const map = new Map();
  DB.forEach(item => {
    if (!map.has(item.univKey)) map.set(item.univKey, item.univ);
  });
  return Array.from(map, ([key, univ]) => ({ key, univ }));
}

function escapeHtml(str) {
  return String(str || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function norm(s) {
  return String(s || "").toLowerCase().trim();
}

function tokenize(q) {
  return norm(q).split(/[\s,，、\/・]+/).filter(Boolean);
}

function calcScore(item, query) {
  const tokens = tokenize(query);
  if (!tokens.length) return 0;

  const pool = [
    item.major,
    item.dept,
    item.univ,
    item.examSubjects,
    item.englishPolicy,
    item.notes,
    item.route,
    ...(item.keywords || []),
    ...(item.zhKeywords || [])
  ].map(norm).filter(Boolean);

  let score = 0;
  tokens.forEach(token => {
    pool.forEach(text => {
      if (text === token) score += 24;
      else if (text.includes(token)) score += 11;
      else if (token.length >= 2 && token.includes(text) && text.length >= 2) score += 6;
    });
  });

  if (norm(item.major).includes(norm(query))) score += 18;
  if (norm(item.examSubjects).includes(norm(query))) score += 10;
  return score;
}

function buildUniversityTabs() {
  const wrap = document.getElementById("univTabs");
  wrap.innerHTML = "";
  uniqUnivs().forEach(item => {
    if (!(item.key in univState)) univState[item.key] = true;
    const tone = TONES[item.key] || { border:"#ccc", bg:"#f3f2f8", text:"#5c5870" };
    const btn = document.createElement("button");
    btn.className = "univ-tab";
    btn.textContent = item.univ;
    btn.onclick = () => toggleUniv(item.key);
    btn.style.borderColor = univState[item.key] ? tone.border : "var(--border)";
    btn.style.background = univState[item.key] ? tone.bg : "var(--surface2)";
    btn.style.color = univState[item.key] ? tone.text : "var(--text2)";
    btn.style.fontWeight = univState[item.key] ? "700" : "500";
    wrap.appendChild(btn);
  });
}

function updateStats() {
  document.getElementById("univCount").textContent = uniqUnivs().length;
  document.getElementById("totalCount").textContent = DB.length;
}

function renderEmpty() {
  document.getElementById("countBadge").textContent = "请输入关键词";
  document.getElementById("resultsList").innerHTML =
    '<div class="empty">输入专业关键词，点击「✦ 推荐」开始搜索。<br><span style="font-size:13px;color:#b8b4cc;">已经补进旧帝大、地方国立、科学技术大学院大学等多所理工修士信息。</span></div>';
}

function doSearch() {
  const q = document.getElementById("queryInput").value.trim();
  if (!q) {
    currentResults = [];
    renderEmpty();
    return;
  }
  document.getElementById("loadingRow").classList.add("show");
  setTimeout(() => {
    currentResults = DB.map(item => ({ ...item, _score: calcScore(item, q) }))
      .filter(item => item._score > 0)
      .sort((a, b) => b._score - a._score);
    document.getElementById("loadingRow").classList.remove("show");
    applyFilters();
  }, 250);
}

function applyFilters() {
  let list = currentResults.length ? [...currentResults] : [];
  list = list.filter(item => univState[item.univKey]);

  if (filterNoJP) {
    list = list.filter(item => !item.langJP);
  }
  if (pillState.toefl && !pillState.ielts) {
    list = list.filter(item => item.toeflOK);
  } else if (!pillState.toefl && pillState.ielts) {
    list = list.filter(item => item.ieltsOK);
  } else if (!pillState.toefl && !pillState.ielts) {
    list = [];
  }

  if (thresholdState === "461") list = list.filter(item => item.englishMin === null || item.englishMin >= 461);
  if (thresholdState === "550") list = list.filter(item => item.englishMin === null || item.englishMin >= 550);

  render(list);
}

function render(list) {
  if (!currentResults.length && !document.getElementById("queryInput").value.trim()) {
    renderEmpty();
    return;
  }

  document.getElementById("countBadge").textContent = list.length + " 条结果";
  const wrap = document.getElementById("resultsList");
  if (!list.length) {
    wrap.innerHTML = '<div class="empty">暂无匹配结果。<br><span style="font-size:13px;">可以换关键词，或者放宽英语 / 日语筛选。</span></div>';
    return;
  }

  const maxScore = Math.max(...list.map(x => x._score || 1), 1);

  wrap.innerHTML = list.map(item => {
    const tone = TONES[item.univKey] || { border:"#ccc", bg:"#f3f2f8", text:"#5c5870", label:item.univ };
    const rel = Math.round(((item._score || 1) / maxScore) * 100);
    const relClass = rel >= 65 ? "rel-high" : rel >= 35 ? "rel-mid" : "rel-low";
    const relText = rel >= 65 ? "高度相关" : rel >= 35 ? "相关" : "参考";
    const open = openCards.has(item.id);

    const tags = [];
    tags.push(item.langJP ? '<span class="ctag ctag-jp">需日语</span>' : '<span class="ctag ctag-ok">日语要求较低</span>');
    tags.push(item.toeflOK ? '<span class="ctag ctag-ok">TOEFL 可</span>' : '<span class="ctag ctag-ng">TOEFL 未明确</span>');
    tags.push(item.ieltsOK ? '<span class="ctag ctag-ok">IELTS 可</span>' : '<span class="ctag ctag-ng">IELTS 不可/未写</span>');
    if (item.englishMin) tags.push('<span class="ctag ctag-info">TOEIC ' + item.englishMin + '+</span>');
    tags.push('<span class="ctag ctag-info">' + escapeHtml(item.route) + '</span>');

    return `
      <div class="result-card" onclick="toggleCard('${item.id}')" style="border-left-color:${tone.border}">
        <div class="card-head">
          <div>
            <div class="card-major">${escapeHtml(item.major)}</div>
            <div class="card-univ">${escapeHtml(item.univ)}<span class="card-univ-badge" style="background:${tone.bg};color:${tone.text}">${escapeHtml(tone.label)}</span> ${escapeHtml(item.dept)}</div>
          </div>
          <span class="relevance-badge ${relClass}">${relText}</span>
        </div>

        <div class="card-tags">${tags.join("")}</div>

        <div class="meta-grid">
          <div class="meta-box"><strong>出愿时间</strong>${escapeHtml(item.apply)}</div>
          <div class="meta-box"><strong>考试时间</strong>${escapeHtml(item.exam)}</div>
          <div class="meta-box"><strong>募集规模</strong>${escapeHtml(item.capacity)}</div>
          <div class="meta-box"><strong>英语说明</strong>${escapeHtml(item.englishPolicy)}</div>
        </div>

        <div class="summary-line"><strong>专业课：</strong>${escapeHtml(item.examSubjects)}</div>
        <div class="summary-line"><strong>备注：</strong>${escapeHtml(item.notes)}</div>

        <div class="detail-drawer ${open ? "open" : ""}" id="dd-${item.id}">
          <div class="detail-inner">
            <div class="detail-row"><span class="detail-key">选拔方式</span><span class="detail-val">${escapeHtml(item.route)}</span></div>
            <div class="detail-row"><span class="detail-key">考试内容</span><span class="detail-val">${escapeHtml(item.examSubjects)}</span></div>
            <div class="detail-row"><span class="detail-key">英语要求</span><span class="detail-val">${escapeHtml(item.englishPolicy)}</span></div>
            <div class="detail-row"><span class="detail-key">注意事项</span><span class="detail-val">${escapeHtml(item.notes)}</span></div>
            <div class="detail-row"><span class="detail-key">官网</span><span class="detail-val"><a href="${escapeHtml(item.url)}" target="_blank" rel="noopener">${escapeHtml(item.url)}</a></span></div>
          </div>
        </div>
      </div>
    `;
  }).join("");
}

function toggleCard(id) {
  if (openCards.has(id)) openCards.delete(id);
  else openCards.add(id);
  const el = document.getElementById("dd-" + id);
  if (el) el.classList.toggle("open", openCards.has(id));
}

function qs(value) {
  document.getElementById("queryInput").value = value;
  doSearch();
}

function resetAll() {
  document.getElementById("queryInput").value = "";
  document.getElementById("filterNoJP").checked = false;
  filterNoJP = false;
  thresholdState = "any";
  pillState = { toefl: true, ielts: true };
  openCards.clear();
  currentResults = [];
  uniqUnivs().forEach(item => { univState[item.key] = true; });
  syncUI();
  renderEmpty();
}

function toggleUniv(key) {
  const active = Object.values(univState).filter(Boolean).length;
  if (univState[key] && active === 1) return;
  univState[key] = !univState[key];
  syncUI();
  applyFilters();
}

function tp(key) {
  pillState[key] = !pillState[key];
  syncUI();
  applyFilters();
}

function th(value) {
  thresholdState = thresholdState === value ? "any" : value;
  syncUI();
  applyFilters();
}

function syncUI() {
  buildUniversityTabs();
  document.getElementById("p-toefl").className = "pill" + (pillState.toefl ? " on" : "");
  document.getElementById("p-ielts").className = "pill" + (pillState.ielts ? " on" : "");
  ["any", "461", "550"].forEach(key => {
    const el = document.getElementById("p-" + key);
    if (!el) return;
    const on = thresholdState === key;
    el.className = "pill" + (on ? (key === "any" ? " on-teal" : " on") : "");
  });
}

document.addEventListener("DOMContentLoaded", () => {
  uniqUnivs().forEach(item => { univState[item.key] = true; });
  updateStats();
  buildUniversityTabs();
  syncUI();
  document.getElementById("filterNoJP").addEventListener("change", function() {
    filterNoJP = this.checked;
    applyFilters();
  });
  renderEmpty();
});
</script>
</body>
</html>
