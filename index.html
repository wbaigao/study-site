<body>
  <div class="container">
    <header class="hero">
      <h1>🎓 日本修士选校系统</h1>
      <p class="subtitle">按学校整理募集要项，支持学校 / 研究科 / 专业方向模糊检索</p>
    </header>

    <section class="panel search-panel">
      <h2>🔎 模糊查询</h2>

      <div class="search-row">
        <div class="field grow">
          <label for="keywordInput">输入关键词</label>
          <input
            id="keywordInput"
            type="text"
            placeholder="例如：名古屋 / 工学研究科 / 电气 / 情报 / 机械"
          />
        </div>

        <div class="action-inline">
          <button id="searchBtn" class="primary-btn">搜索</button>
          <button id="resetBtn" class="secondary-btn">重置</button>
        </div>
      </div>

      <div id="searchHint" class="hint">
        可搜索学校名称、研究科、专业方向、考试内容等关键词。
      </div>
    </section>

    <section class="panel">
      <div class="section-head">
        <h2>🏫 学校列表</h2>
        <span id="resultCount" class="count-badge">0 所学校</span>
      </div>
      <div id="schoolList" class="school-grid"></div>
    </section>

    <section id="detailSection" class="panel detail-section hidden">
      <div class="detail-top">
        <button onclick="backToSchools()" class="back-btn">← 返回学校列表</button>
        <div>
          <h2 id="schoolTitle">学校详情</h2>
          <p id="schoolSubtitle" class="subtitle small">点击研究科查看具体专业</p>
        </div>
      </div>

      <div class="detail-toolbar">
        <div class="field grow">
          <label for="detailKeywordInput">当前学校内检索</label>
          <input
            id="detailKeywordInput"
            type="text"
            placeholder="搜索研究科 / major / course / 考试内容"
          />
        </div>
      </div>

      <div id="graduateSchoolList" class="graduate-school-list"></div>
    </section>
  </div>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: #f5f7fb;
      color: #1f2937;
    }

    .container {
      max-width: 1120px;
      margin: 0 auto;
      padding: 24px 16px 48px;
    }

    .hero {
      margin-bottom: 20px;
    }

    .hero h1 {
      margin: 0 0 8px;
      font-size: 40px;
      line-height: 1.2;
    }

    .subtitle {
      margin: 0;
      color: #6b7280;
      font-size: 15px;
    }

    .subtitle.small {
      margin-top: 6px;
      font-size: 14px;
    }

    .panel {
      background: #fff;
      border-radius: 18px;
      padding: 20px;
      margin-bottom: 18px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.06);
      border: 1px solid #e5e7eb;
    }

    .panel h2 {
      margin: 0 0 16px;
      font-size: 24px;
    }

    .search-row,
    .detail-toolbar {
      display: flex;
      gap: 12px;
      align-items: end;
      flex-wrap: wrap;
    }

    .field {
      min-width: 220px;
    }

    .field.grow {
      flex: 1;
    }

    .field label {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
      font-weight: 600;
      color: #374151;
    }

    input,
    button {
      font: inherit;
    }

    input {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 12px;
      padding: 12px 14px;
      background: #fff;
      color: #111827;
      outline: none;
    }

    input:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.12);
    }

    .action-inline {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .primary-btn,
    .secondary-btn,
    .back-btn,
    .toggle-btn {
      border: none;
      border-radius: 12px;
      padding: 12px 16px;
      cursor: pointer;
      font-weight: 600;
      white-space: nowrap;
    }

    .primary-btn {
      background: #4f46e5;
      color: #fff;
    }

    .primary-btn:hover {
      background: #4338ca;
    }

    .secondary-btn,
    .back-btn {
      background: #eef2ff;
      color: #3730a3;
    }

    .secondary-btn:hover,
    .back-btn:hover {
      background: #e0e7ff;
    }

    .toggle-btn {
      background: #f3f4f6;
      color: #374151;
      padding: 10px 14px;
      font-size: 14px;
    }

    .toggle-btn:hover {
      background: #e5e7eb;
    }

    .hint {
      margin-top: 14px;
      font-size: 14px;
      color: #6b7280;
    }

    .section-head,
    .detail-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .count-badge {
      background: #eef2ff;
      color: #4338ca;
      font-size: 13px;
      font-weight: 700;
      padding: 8px 12px;
      border-radius: 999px;
    }

    .school-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 16px;
    }

    .school-card {
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 18px;
      background: linear-gradient(180deg, #ffffff 0%, #fafbff 100%);
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
      cursor: pointer;
    }

    .school-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 18px rgba(79, 70, 229, 0.08);
      border-color: #c7d2fe;
    }

    .school-card h3 {
      margin: 0 0 8px;
      font-size: 24px;
    }

    .school-card p {
      margin: 0;
      color: #6b7280;
      font-size: 14px;
      line-height: 1.6;
    }

    .school-meta {
      margin-top: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .school-tag {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      background: #f3f4f6;
      color: #374151;
      font-size: 12px;
      font-weight: 600;
      margin-right: 6px;
      margin-bottom: 6px;
    }

    .open-text {
      color: #4f46e5;
      font-size: 13px;
      font-weight: 700;
    }

    .hidden {
      display: none;
    }

    .graduate-school-list {
      display: grid;
      gap: 16px;
      margin-top: 16px;
    }

    .graduate-card {
      border: 1px solid #e5e7eb;
      border-radius: 18px;
      background: #fcfcff;
      padding: 18px;
    }

    .graduate-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .graduate-title-wrap h3 {
      margin: 0;
      font-size: 22px;
    }

    .graduate-meta {
      margin-top: 6px;
      color: #6b7280;
      font-size: 13px;
    }

    .major-list {
      display: none;
      margin-top: 16px;
    }

    .major-list.show {
      display: block;
    }

    .major-card {
      border: 1px solid #e5e7eb;
      border-radius: 16px;
      padding: 18px;
      background: #fff;
      box-shadow: 0 4px 14px rgba(15, 23, 42, 0.04);
      margin-bottom: 12px;
    }

    .major-card:last-child {
      margin-bottom: 0;
    }

    .major-title {
      margin: 0 0 8px;
      font-size: 20px;
    }

    .major-subtitle {
      margin: 0 0 14px;
      font-size: 14px;
      color: #6b7280;
    }

    .info-row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 14px;
    }

    .info-box {
      background: #f9fafb;
      border: 1px solid #eef2f7;
      border-radius: 12px;
      padding: 12px;
      font-size: 14px;
    }

    .info-box strong {
      display: block;
      margin-bottom: 6px;
      color: #111827;
    }

    .tag-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .tag {
      display: inline-block;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
    }

    .tag-blue {
      background: #dbeafe;
      color: #1d4ed8;
    }

    .tag-gray {
      background: #f3f4f6;
      color: #4b5563;
    }

    .content-block {
      margin-top: 14px;
      padding-top: 14px;
      border-top: 1px dashed #e5e7eb;
    }

    .content-block h4 {
      margin: 0 0 8px;
      font-size: 15px;
    }

    .content-block p {
      margin: 0;
      line-height: 1.7;
      color: #374151;
      font-size: 14px;
    }

    .contact-list {
      margin: 0;
      padding-left: 18px;
      color: #374151;
      line-height: 1.8;
      font-size: 14px;
    }

    .contact-list a {
      color: #4f46e5;
      text-decoration: none;
      word-break: break-all;
    }

    .contact-list a:hover {
      text-decoration: underline;
    }

    .empty-box {
      padding: 28px 16px;
      text-align: center;
      color: #6b7280;
      background: #f9fafb;
      border: 1px dashed #d1d5db;
      border-radius: 14px;
    }

    @media (max-width: 768px) {
      .hero h1 {
        font-size: 30px;
      }

      .search-row,
      .detail-toolbar {
        flex-direction: column;
        align-items: stretch;
      }

      .action-inline {
        width: 100%;
      }

      .action-inline button {
        flex: 1;
      }

      .info-row {
        grid-template-columns: 1fr;
      }

      .school-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>

  <script>
    let schoolsData = [];
    let currentSchoolId = "";
    let currentSchoolName = "";
    let currentSchoolData = null;

    const schoolMetaMap = {
      "osaka-u": {
        desc: "点击查看该校已整理的研究科与专业信息。",
        tags: ["国立", "研究型"]
      },
      "tohoku-u": {
        desc: "点击查看该校已整理的研究科与专业信息。",
        tags: ["国立", "研究型"]
      },
      "nagoya-u": {
        desc: "点击查看该校已整理的研究科与专业信息。",
        tags: ["国立", "工学强校"]
      },
      "tokyo-u": {
        desc: "点击查看该校已整理的研究科与专业信息。",
        tags: ["国立", "顶尖院校"]
      },
      "kyoto-u": {
        desc: "点击查看该校已整理的研究科与专业信息。",
        tags: ["国立", "研究型"]
      }
    };

    async function loadSchools() {
      try {
        const res = await fetch("data/schools.json");
        const data = await res.json();
        schoolsData = Array.isArray(data) ? data : [];
        renderSchools(schoolsData);
      } catch (err) {
        document.getElementById("schoolList").innerHTML =
          '<div class="empty-box">学校列表加载失败，请检查 data/schools.json 是否存在且格式正确。</div>';
        console.error(err);
      }
    }

    function renderSchools(data) {
      const schoolList = document.getElementById("schoolList");
      const resultCount = document.getElementById("resultCount");
      schoolList.innerHTML = "";

      if (!data.length) {
        schoolList.innerHTML = '<div class="empty-box">没有找到匹配学校，请换个关键词试试。</div>';
        resultCount.textContent = "0 所学校";
        return;
      }

      resultCount.textContent = `${data.length} 所学校`;

      data.forEach((school) => {
        const meta = schoolMetaMap[school.id] || {
          desc: school.desc || "点击查看该校已整理的研究科与专业信息。",
          tags: ["学校"]
        };

        schoolList.innerHTML += `
          <div class="school-card" onclick="openSchool('${escapeJs(school.id)}', '${escapeJs(school.name || "")}', '${escapeJs(school.desc || "")}')">
            <h3>${escapeHtml(school.name || "")}</h3>
            <p>${escapeHtml(school.desc || meta.desc || "")}</p>
            <div class="school-meta">
              <div>
                ${(meta.tags || []).map(tag => `<span class="school-tag">${escapeHtml(tag)}</span>`).join("")}
              </div>
              <span class="open-text">查看详情 →</span>
            </div>
          </div>
        `;
      });
    }

    async function openSchool(id, name, desc) {
      currentSchoolId = id;
      currentSchoolName = name;

      document.getElementById("detailSection").classList.remove("hidden");
      document.getElementById("schoolTitle").textContent = name;
      document.getElementById("schoolSubtitle").textContent = desc || "点击研究科查看具体专业";

      try {
        const res = await fetch(`data/${id}.json`);
        const data = await res.json();
        currentSchoolData = data;
        document.getElementById("detailKeywordInput").value = "";
        renderGraduateSchools(data);
        document.getElementById("detailSection").scrollIntoView({ behavior: "smooth", block: "start" });
      } catch (err) {
        document.getElementById("graduateSchoolList").innerHTML =
          '<div class="empty-box">该学校数据加载失败，请检查对应 json 文件是否存在且格式正确。</div>';
        console.error(err);
      }
    }

    function backToSchools() {
      document.getElementById("detailSection").classList.add("hidden");
      document.getElementById("graduateSchoolList").innerHTML = "";
      document.getElementById("detailKeywordInput").value = "";
    }

    function renderGraduateSchools(data) {
      const container = document.getElementById("graduateSchoolList");
      container.innerHTML = "";

      if (!data || !Array.isArray(data.graduate_schools) || !data.graduate_schools.length) {
        container.innerHTML = '<div class="empty-box">当前学校下没有研究科数据。</div>';
        return;
      }

      data.graduate_schools.forEach((gs, index) => {
        const majors = Array.isArray(gs.majors) ? gs.majors : [];
        const card = document.createElement("div");
        card.className = "graduate-card";

        card.innerHTML = `
          <div class="graduate-header">
            <div class="graduate-title-wrap">
              <h3>${escapeHtml(gs.name || "未命名研究科")}</h3>
              <div class="graduate-meta">${majors.length} 个专业</div>
            </div>
            <button class="toggle-btn" onclick="toggleGraduateSchool(${index})">展开专业</button>
          </div>
          <div class="major-list" id="majorList-${index}">
            ${majors.length ? majors.map(item => renderMajorCard(item)).join("") : '<div class="empty-box">该研究科下暂无专业数据。</div>'}
          </div>
        `;

        container.appendChild(card);
      });
    }

    function renderMajorCard(item) {
      const englishTags = (item.english_tests || []).length
        ? (item.english_tests || []).map(
            test => `<span class="tag tag-blue">${escapeHtml(test)}</span>`
          ).join("")
        : '<span class="tag tag-gray">英语要求未写明</span>';

      return `
        <div class="major-card">
          <h3 class="major-title">${escapeHtml(item.major || "未填写")} · ${escapeHtml(item.course || "未填写")}</h3>
          <p class="major-subtitle">${escapeHtml(item.graduate_school || "")}</p>

          <div class="info-row">
            <div class="info-box">
              <strong>出愿时间</strong>
              ${escapeHtml(item.apply_start || "未填写")} ~ ${escapeHtml(item.apply_end || "未填写")}
            </div>
            <div class="info-box">
              <strong>考试时间</strong>
              ${escapeHtml(item.exam_start || "未填写")} ~ ${escapeHtml(item.exam_end || "未填写")}
            </div>
            <div class="info-box">
              <strong>考试方式</strong>
              ${escapeHtml(item.exam_method || "未填写")}
            </div>
            <div class="info-box">
              <strong>学费</strong>
              ${escapeHtml(item.tuition || "未填写")}
            </div>
          </div>

          <div class="info-row">
            <div class="info-box">
              <strong>募集人数</strong>
              ${item.capacity ?? "未填写"}
            </div>
            <div class="info-box">
              <strong>检定料 / 入学料</strong>
              ${escapeHtml(item.application_fee || "未填写")} / ${escapeHtml(item.admission_fee || "未填写")}
            </div>
          </div>

          <div class="tag-row">
            ${englishTags}
          </div>

          <div class="content-block">
            <h4>考试内容</h4>
            <p>${escapeHtml(item.exam_content || "暂无详细说明")}</p>
          </div>

          <div class="content-block">
            <h4>联系方式</h4>
            <ul class="contact-list">
              <li>联系人 / 方向：${escapeHtml(item.contact_name || "未填写")}</li>
              <li>电话：${escapeHtml(item.contact_phone || "未填写")}</li>
              <li>邮箱：${escapeHtml(item.contact_email || "未填写")}</li>
              <li>官网：${
                item.contact_url
                  ? `<a href="${escapeAttr(item.contact_url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(item.contact_url)}</a>`
                  : "未填写"
              }</li>
            </ul>
          </div>
        </div>
      `;
    }

    function toggleGraduateSchool(index) {
      const el = document.getElementById(`majorList-${index}`);
      if (!el) return;
      el.classList.toggle("show");
    }

    async function runSearch() {
      const keyword = document.getElementById("keywordInput").value.trim().toLowerCase();
      const hint = document.getElementById("searchHint");

      if (!keyword) {
        hint.textContent = "请输入关键词后再搜索。";
        renderSchools(schoolsData);
        return;
      }

      hint.textContent = "正在检索学校数据…";

      const matchedSchoolIds = [];

      for (const school of schoolsData) {
        try {
          const baseText = `${school.name || ""} ${school.desc || ""}`.toLowerCase();
          if (baseText.includes(keyword)) {
            matchedSchoolIds.push(school.id);
            continue;
          }

          const res = await fetch(`data/${school.id}.json`);
          const data = await res.json();

          if (matchesSchoolData(data, keyword)) {
            matchedSchoolIds.push(school.id);
          }
        } catch (err) {
          console.error(`读取 ${school.id}.json 失败`, err);
        }
      }

      const filteredSchools = schoolsData.filter(item => matchedSchoolIds.includes(item.id));

      hint.textContent = filteredSchools.length
        ? `找到 ${filteredSchools.length} 所匹配学校。`
        : "没有找到匹配学校，请换个关键词试试。";

      renderSchools(filteredSchools);
    }

    function matchesSchoolData(data, keyword) {
      if (!data) return false;

      const schoolText = [
        data.university,
        data.desc
      ].filter(Boolean).join(" ").toLowerCase();

      if (schoolText.includes(keyword)) return true;

      const graduateSchools = Array.isArray(data.graduate_schools) ? data.graduate_schools : [];

      return graduateSchools.some(gs => {
        const gsText = [gs.name].filter(Boolean).join(" ").toLowerCase();
        if (gsText.includes(keyword)) return true;

        const majors = Array.isArray(gs.majors) ? gs.majors : [];
        return majors.some(item => {
          const text = [
            item.major,
            item.course,
            item.exam_method,
            item.exam_content,
            item.contact_name,
            item.contact_email
          ].filter(Boolean).join(" ").toLowerCase();

          return text.includes(keyword);
        });
      });
    }

    function resetSearch() {
      document.getElementById("keywordInput").value = "";
      document.getElementById("searchHint").textContent = "可搜索学校名称、研究科、专业方向、考试内容等关键词。";
      renderSchools(schoolsData);
    }

    function filterCurrentSchoolEntries() {
      const keyword = document.getElementById("detailKeywordInput").value.trim().toLowerCase();

      if (!currentSchoolData) return;

      if (!keyword) {
        renderGraduateSchools(currentSchoolData);
        return;
      }

      const filteredGraduateSchools = (currentSchoolData.graduate_schools || []).map(gs => {
        const majors = (gs.majors || []).filter(item => {
          const text = [
            gs.name,
            item.major,
            item.course,
            item.exam_method,
            item.exam_content,
            item.contact_name,
            item.contact_email
          ].filter(Boolean).join(" ").toLowerCase();

          return text.includes(keyword);
        });

        return {
          ...gs,
          majors
        };
      }).filter(gs => {
        const gsName = (gs.name || "").toLowerCase();
        return gs.majors.length || gsName.includes(keyword);
      });

      renderGraduateSchools({
        ...currentSchoolData,
        graduate_schools: filteredGraduateSchools
      });
    }

    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#39;");
    }

    function escapeAttr(value) {
      return String(value).replace(/"/g, "&quot;");
    }

    function escapeJs(value) {
      return String(value)
        .replace(/\\/g, "\\\\")
        .replace(/'/g, "\\'")
        .replace(/"/g, '\\"');
    }

    document.getElementById("searchBtn").addEventListener("click", runSearch);
    document.getElementById("resetBtn").addEventListener("click", resetSearch);
    document.getElementById("keywordInput").addEventListener("keydown", (e) => {
      if (e.key === "Enter") runSearch();
    });
    document.getElementById("detailKeywordInput").addEventListener("input", filterCurrentSchoolEntries);

    loadSchools();
  </script>
</body>
