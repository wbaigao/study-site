<body>

<h1>日本研究生募集要项</h1>

<!-- 🎓 智能推荐 -->
<h3>🎓 智能推荐</h3>

<select id="backgroundSelect">
  <option value="">选择你的本科专业</option>
  <option value="计算机">计算机</option>
  <option value="机械">机械</option>
  <option value="物理">物理</option>
  <option value="电子">电子</option>
</select>

<button onclick="recommend()">智能推荐</button>

<div id="recommendResult"></div>

<hr>

<!-- 🎯 专业标签 -->
<div id="programTags"></div>

<br>

<!-- 🔍 搜索 -->
<input type="text" id="searchInput" placeholder="搜索学校 / 专业">

<!-- 🔥 正在出愿 -->
<h2>🔥 正在出愿</h2>
<div id="ongoing"></div>

<!-- ⏳ 即将开始 -->
<h2>⏳ 即将开始</h2>
<div id="upcoming"></div>

<hr>

<!-- 🎯 筛选 -->
<label><input type="checkbox" id="noEnglish"> 不需要英语</label>
<label><input type="checkbox" id="noJapanese"> 不需要日语</label>
<label><input type="checkbox" id="notExpired"> 未截止</label>

<hr>

<!-- 📊 全部 -->
<h2>📊 全部项目</h2>
<div id="list"></div>

<script>
let allData = [];
let selectedProgram = "";

// 读取数据
fetch('data.json')
  .then(res => res.json())
  .then(data => {
    allData = data;
    renderProgramTags(data);
    updateAll();
  });

// 卡片UI
function renderCard(item){
  return `
    <div class="card">
      <div class="title">${item.university} · ${item.program}</div>
      <div class="time">${item.apply_start} ~ ${item.deadline}</div>
    </div>
  `;
}

// 自动生成专业标签
function renderProgramTags(data){
  const container = document.getElementById('programTags');
  const programs = [...new Set(data.map(d => d.program))];

  container.innerHTML = "";

  programs.forEach(p => {
    container.innerHTML += `
      <span class="tag" onclick="selectProgram('${p}')">${p}</span>
    `;
  });
}

// 点击标签
function selectProgram(p){
  selectedProgram = (selectedProgram === p) ? "" : p;
  updateAll();
}

// 核心筛选
function getFilteredData(){
  let filtered = [...allData];

  const keyword = document.getElementById('searchInput').value.trim();
  const noEnglish = document.getElementById('noEnglish').checked;
  const noJapanese = document.getElementById('noJapanese').checked;
  const notExpired = document.getElementById('notExpired').checked;

  if(selectedProgram){
    filtered = filtered.filter(item => item.program === selectedProgram);
  }

  if(keyword){
    filtered = filtered.filter(item =>
      item.university.includes(keyword) ||
      item.program.includes(keyword)
    );
  }

  if(noEnglish){
    filtered = filtered.filter(item => item.english === "不要求");
  }

  if(noJapanese){
    filtered = filtered.filter(item => item.japanese === "不要求");
  }

  if(notExpired){
    const today = new Date();
    filtered = filtered.filter(item => new Date(item.deadline) > today);
  }

  filtered.sort((a,b)=> new Date(a.deadline)-new Date(b.deadline));

  return filtered;
}

// 更新页面
function updateAll(){
  const data = getFilteredData();
  renderList(data);
  renderSections(data);
}

// 列表
function renderList(data){
  const list = document.getElementById('list');
  list.innerHTML = "";
  data.forEach(item => list.innerHTML += renderCard(item));
}

// 推荐区
function renderSections(data){
  const ongoing = document.getElementById('ongoing');
  const upcoming = document.getElementById('upcoming');

  ongoing.innerHTML = "";
  upcoming.innerHTML = "";

  const today = new Date();

  data.forEach(item => {
    const start = new Date(item.apply_start);
    const end = new Date(item.deadline);

    if(start <= today && end >= today){
      ongoing.innerHTML += renderCard(item);
    }

    if(start > today){
      upcoming.innerHTML += renderCard(item);
    }
  });
}

// 🔥 智能推荐
function recommend(){
  const bg = document.getElementById('backgroundSelect').value;
  const div = document.getElementById('recommendResult');

  if(!bg){
    div.innerHTML = "<p>请先选择本科专业</p>";
    return;
  }

  let result = allData.filter(item =>
    item.allowed_background && item.allowed_background.includes(bg)
  );

  result.sort((a,b)=> new Date(a.deadline)-new Date(b.deadline));

  if(result.length === 0){
    div.innerHTML = "<p>暂无匹配结果</p>";
    return;
  }

  div.innerHTML = "<h3>🎯 推荐结果</h3>";
  result.forEach(item => div.innerHTML += renderCard(item));
}

// 自动触发
document.getElementById('searchInput').addEventListener('input', updateAll);
document.getElementById('noEnglish').addEventListener('change', updateAll);
document.getElementById('noJapanese').addEventListener('change', updateAll);
document.getElementById('notExpired').addEventListener('change', updateAll);

</script>

</body>
