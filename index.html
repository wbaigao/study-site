<body>

<h1>🎓 日本修士选校系统</h1>

<h2>🏫 选择学校</h2>
<div id="schoolList"></div>

<hr>

<div id="detail" style="display:none;">
  <button onclick="back()">← 返回</button>
  <h2 id="schoolTitle"></h2>

  <h3>🎯 筛选</h3>

  <select id="majorSelect">
    <option value="">全部专业</option>
  </select>

  <select id="englishSelect">
    <option value="">英语情况</option>
    <option value="TOEIC">TOEIC</option>
    <option value="TOEFL">TOEFL</option>
    <option value="IELTS">IELTS</option>
    <option value="none">无英语</option>
  </select>

  <label><input type="checkbox" id="noContact"> 不联系教授</label>

  <hr>

  <div id="list"></div>
</div>

<script>
let currentData = [];

// 首页加载学校
fetch("data/schools.json")
.then(res=>res.json())
.then(data=>{
  const div = document.getElementById("schoolList");
  data.forEach(s=>{
    div.innerHTML += `
      <div onclick="openSchool('${s.id}','${s.name}')"
           style="background:#fff;padding:12px;margin:10px;border-radius:8px;cursor:pointer;">
        <b>${s.name}</b><br>
        ${s.graduate_school}
      </div>
    `;
  });
});

// 打开学校
function openSchool(id,name){
  document.getElementById("schoolList").style.display="none";
  document.getElementById("detail").style.display="block";
  document.getElementById("schoolTitle").innerText=name;

  fetch(`data/${id}.json`)
  .then(res=>res.json())
  .then(data=>{
    currentData = data;
    initMajors(data);
    render(data);
  });
}

// 返回
function back(){
  document.getElementById("schoolList").style.display="block";
  document.getElementById("detail").style.display="none";
}

// 初始化专业
function initMajors(data){
  const select = document.getElementById("majorSelect");
  select.innerHTML = `<option value="">全部专业</option>`;
  const majors = [...new Set(data.map(d=>d.major))];
  majors.forEach(m=>{
    select.innerHTML += `<option value="${m}">${m}</option>`;
  });
}

// 渲染
function render(data){
  const div = document.getElementById("list");
  div.innerHTML="";

  data.forEach(item=>{
    div.innerHTML+=`
      <div style="background:#fff;padding:12px;margin:10px;border-radius:8px;">
        <b>${item.major} · ${item.course}</b><br>
        📄 ${item.apply_start} ~ ${item.apply_end}<br>
        📝 ${item.exam_start} ~ ${item.exam_end}<br>

        ${item.exam_method}<br>
        ${item.english_tests.join(", ")}<br>
        ${item.require_contact_professor?"⚠️需联系教授":""}

        <p>${item.exam_content}</p>
        <p>📧 ${item.contact_email}</p>
      </div>
    `;
  });
}

// 筛选
function filter(){
  let data = [...currentData];

  const major = document.getElementById("majorSelect").value;
  const eng = document.getElementById("englishSelect").value;
  const noContact = document.getElementById("noContact").checked;

  if(major){
    data = data.filter(d=>d.major===major);
  }

  if(eng==="none"){
    data = data.filter(d=>d.english_tests.length===0);
  }else if(eng){
    data = data.filter(d=>d.english_tests.includes(eng));
  }

  if(noContact){
    data = data.filter(d=>!d.require_contact_professor);
  }

  render(data);
}

document.getElementById("majorSelect").addEventListener("change",filter);
document.getElementById("englishSelect").addEventListener("change",filter);
document.getElementById("noContact").addEventListener("change",filter);

</script>

</body>
