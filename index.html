<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f8f7fc; --surface: #ffffff; --surface2: #f3f2f8;
    --border: rgba(0,0,0,0.08); --border-hover: rgba(83,74,183,0.35);
    --text: #1a1825; --text2: #5c5870; --text3: #9590aa;
    --purple: #534AB7; --purple-light: #EEEDFE; --purple-mid: #AFA9EC; --purple-dark: #3C3489;
    --teal: #0F6E56; --teal-light: #E1F5EE;
    --amber: #633806; --amber-light: #FAEEDA;
    --blue: #0C447C; --blue-light: #E6F1FB;
    --gray-light: #F1EFE8; --gray-mid: #5F5E5A;
    --coral: #993C1D; --coral-light: #FAECE7;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic UI", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; background: var(--bg); color: var(--text); font-size: 15px; line-height: 1.6; min-height: 100vh; }
  .page { max-width: 960px; margin: 0 auto; padding: 2rem 1rem 4rem; }
  .hero { margin-bottom: 1.5rem; }
  .hero-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; flex-wrap: wrap; }
  .hero h1 { font-size: 24px; font-weight: 600; letter-spacing: -0.3px; }
  .ai-badge { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; font-weight: 600; background: var(--purple-light); color: var(--purple-dark); padding: 3px 8px; border-radius: 999px; }
  .hero p { font-size: 14px; color: var(--text2); line-height: 1.7; }
  .stats-bar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 1.25rem; }
  .stat-pill { display: flex; align-items: center; gap: 6px; font-size: 12px; font-weight: 500; background: var(--surface); border: 1px solid var(--border); padding: 5px 12px; border-radius: 999px; color: var(--text2); }
  .stat-pill span { font-size: 15px; font-weight: 700; color: var(--purple); }
  .search-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 1.25rem 1.5rem; margin-bottom: 1.25rem; box-shadow: 0 2px 12px rgba(0,0,0,0.04); }
  .search-row { display: flex; gap: 8px; margin-bottom: 1rem; }
  .search-input { flex: 1; font-size: 15px; font-family: inherit; padding: 11px 16px; border-radius: 12px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); outline: none; transition: border-color 0.15s, box-shadow 0.15s; }
  .search-input:focus { border-color: var(--purple-mid); box-shadow: 0 0 0 3px rgba(127,119,221,0.15); background: var(--surface); }
  .btn { padding: 11px 20px; border-radius: 12px; border: 1px solid var(--border); background: var(--surface); color: var(--text); cursor: pointer; font-size: 14px; font-family: inherit; font-weight: 500; white-space: nowrap; transition: background 0.15s; }
  .btn:hover { background: var(--surface2); }
  .btn-primary { background: var(--purple)!important; color:#fff!important; border-color:var(--purple)!important; }
  .btn-primary:hover { background: var(--purple-dark)!important; }
  .quick-row { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; margin-bottom: 1rem; }
  .quick-label { font-size: 12px; color: var(--text3); }
  .quick-btn { padding: 4px 11px; border-radius: 999px; border: 1px solid var(--purple-mid); background: var(--purple-light); color: var(--purple-dark); font-size: 12px; cursor: pointer; font-family: inherit; transition: background 0.12s; }
  .quick-btn:hover { background: #d4d0f8; }
  .divider { height: 1px; background: var(--border); margin: 1rem 0; }
  .filter-section { display: flex; flex-wrap: wrap; gap: 10px 20px; align-items: flex-start; }
  .filter-block { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .filter-label { font-size: 12px; color: var(--text3); white-space: nowrap; }
  .toggle-label { display: flex; align-items: center; gap: 5px; font-size: 13px; color: var(--text2); cursor: pointer; }
  .toggle-label input { width: 14px; height: 14px; cursor: pointer; accent-color: var(--purple); }
  .pill { padding: 4px 12px; border-radius: 999px; border: 1px solid var(--border); background: var(--surface2); color: var(--text2); font-size: 12px; cursor: pointer; transition: all 0.12s; white-space: nowrap; font-family: inherit; }
  .pill.on { background: var(--purple-light); border-color: var(--purple-mid); color: var(--purple-dark); font-weight: 500; }
  .pill.on-teal { background: var(--teal-light); border-color: #9FE1CB; color: var(--teal); font-weight: 500; }
  .univ-tab { padding: 4px 12px; border-radius: 999px; border: 1px solid var(--border); font-size: 12px; cursor: pointer; transition: all 0.12s; background: var(--surface2); color: var(--text2); font-family: inherit; }
  .univ-tab.on-hoku { background: var(--blue-light); border-color: #B5D4F4; color: var(--blue); font-weight: 500; }
  .univ-tab.on-osaka { background: var(--coral-light); border-color: #F5C4B3; color: var(--coral); font-weight: 500; }
  .univ-tab.on-nagoya { background: var(--teal-light); border-color: #9FE1CB; color: var(--teal); font-weight: 500; }
  .results-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; }
  .results-header h2 { font-size: 15px; font-weight: 600; }
  .count-badge { font-size: 12px; color: var(--text2); background: var(--surface); border: 1px solid var(--border); padding: 3px 10px; border-radius: 999px; }
  .results-list { display: grid; gap: 10px; }
  .result-card { background: var(--surface); border: 1px solid var(--border); border-left: 3px solid var(--border); border-radius: 14px; padding: 1rem 1.25rem; cursor: pointer; transition: border-color 0.15s, box-shadow 0.15s; }
  .result-card:hover { box-shadow: 0 2px 12px rgba(83,74,183,0.08); }
  .result-card.top-match.univ-hoku { border-left-color: #378ADD; }
  .result-card.top-match.univ-osaka { border-left-color: #D85A30; }
  .result-card.top-match.univ-nagoya { border-left-color: #1D9E75; }
  .card-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 8px; }
  .card-major { font-size: 15px; font-weight: 600; color: var(--text); line-height: 1.4; }
  .card-univ { font-size: 12px; color: var(--text3); margin-top: 3px; }
  .card-univ-badge { display: inline-block; font-size: 11px; font-weight: 600; padding: 1px 7px; border-radius: 999px; margin-left: 5px; vertical-align: middle; }
  .badge-hoku { background: var(--blue-light); color: var(--blue); }
  .badge-osaka { background: var(--coral-light); color: var(--coral); }
  .badge-nagoya { background: var(--teal-light); color: var(--teal); }
  .relevance-badge { flex-shrink: 0; font-size: 12px; font-weight: 600; padding: 3px 10px; border-radius: 999px; }
  .rel-high { background: var(--purple-light); color: var(--purple-dark); }
  .rel-mid  { background: var(--teal-light); color: var(--teal); }
  .rel-low  { background: var(--gray-light); color: var(--gray-mid); }
  .card-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 10px; }
  .ctag { font-size: 11px; padding: 2px 8px; border-radius: 999px; border: 1px solid var(--border); color: var(--text2); background: var(--surface2); }
  .ctag-jp   { background: var(--amber-light); border-color: #FAC775; color: var(--amber); }
  .ctag-warn { background: #FCEBEB; border-color: #F7C1C1; color: #791F1F; }
  .ctag-ok   { background: var(--teal-light); border-color: #9FE1CB; color: var(--teal); }
  .ctag-ng   { background: #FCEBEB; border-color: #F7C1C1; color: #791F1F; }
  .ctag-alert { background: #FAEEDA; border-color: #FAC775; color: var(--amber); }
  .card-meta { font-size: 13px; color: var(--text2); display: flex; flex-wrap: wrap; gap: 0 16px; }
  .card-meta strong { color: var(--text); font-weight: 500; }
  .detail-drawer { overflow: hidden; max-height: 0; transition: max-height 0.25s ease; border-top: 1px solid transparent; }
  .detail-drawer.open { max-height: 500px; border-top: 1px solid var(--border); margin-top: 10px; padding-top: 10px; }
  .detail-inner { display: grid; gap: 6px; }
  .detail-row { display: flex; gap: 10px; font-size: 13px; }
  .detail-key { font-weight: 500; color: var(--text); min-width: 72px; flex-shrink: 0; }
  .detail-val { color: var(--text2); line-height: 1.7; }
  .detail-val a { color: var(--purple); text-decoration: none; word-break: break-all; }
  .detail-val a:hover { text-decoration: underline; }
  .empty { text-align: center; padding: 3rem 0; color: var(--text3); font-size: 14px; line-height: 1.8; }
  .loading-row { font-size: 13px; color: var(--text3); padding: 0.5rem 0 0; display: none; }
  .loading-row.show { display: block; }
  @media (max-width: 600px) { .search-row { flex-direction: column; } .filter-section { flex-direction: column; } .hero h1 { font-size: 20px; } }
</style>
</head>

<div class="page">

      <button class="btn btn-primary" onclick="doSearch()">✦ AI 推荐</button>
      <button class="btn" onclick="resetAll()">重置</button>
    </div>
    <div class="quick-row">
      <span class="quick-label">快速搜索：</span>
      <button class="quick-btn" onclick="qs('機械工学')">機械工学</button>
      <button class="quick-btn" onclick="qs('電気電子')">電気電子</button>
      <button class="quick-btn" onclick="qs('情報通信')">情報通信</button>
      <button class="quick-btn" onclick="qs('建筑・建設')">建筑・建設</button>
      <button class="quick-btn" onclick="qs('環境工学')">環境工学</button>
      <button class="quick-btn" onclick="qs('材料科学')">材料科学</button>
      <button class="quick-btn" onclick="qs('原子力・量子')">原子力・量子</button>
      <button class="quick-btn" onclick="qs('応用物理')">応用物理</button>
      <button class="quick-btn" onclick="qs('化学・化工')">化学・化工</button>
      <button class="quick-btn" onclick="qs('宇宙・航空')">宇宙・航空</button>
      <button class="quick-btn" onclick="qs('土木工学')">土木工学</button>
      <button class="quick-btn" onclick="qs('生命・バイオ')">生命・バイオ</button>
    </div>
    <div class="divider"></div>
    <div class="filter-section">
      <div class="filter-block">
        <span class="filter-label">院校</span>
        <button class="univ-tab on-hoku" id="t-hoku" onclick="toggleUniv('hoku')">北海道大学</button>
        <button class="univ-tab on-osaka" id="t-osaka" onclick="toggleUniv('osaka')">大阪大学</button>
        <button class="univ-tab on-nagoya" id="t-nagoya" onclick="toggleUniv('nagoya')">名古屋大学</button>
      </div>
      <div class="filter-block">
        <span class="filter-label">英语</span>
        <span class="pill on" id="p-toefl" onclick="tp('toefl')">TOEFL OK</span>
        <span class="pill on" id="p-ielts" onclick="tp('ielts')">IELTS OK</span>
      </div>
      <div class="filter-block">
        <span class="filter-label">TOEIC门槛</span>
        <span class="pill on-teal" id="p-any"  onclick="th('any')">不限</span>
        <span class="pill"         id="p-461"  onclick="th('461')">排除460以下</span>
        <span class="pill"         id="p-550"  onclick="th('550')">排除549以下</span>
      </div>
    </div>
  </div>

  <div class="loading-row" id="loadingRow">✦ AI 正在分析语义相关度...</div>
  <div id="resultsWrap">
    <div class="results-header">
      <h2>推荐结果</h2>
      <span class="count-badge" id="countBadge">请输入关键词</span>
    </div>
    <div class="results-list" id="resultsList">
      <div class="empty">输入专业关键词，点击「✦ AI 推荐」开始搜索<br><span style="font-size:13px;color:#b8b4cc;">覆盖北海道大学・大阪大学・名古屋大学，共 <span id="emptyTotal">-</span> 个专攻</span></div>
    </div>
  </div>
</div>

  {id:"nagoya-energy",univ:"名古屋大学",univKey:"nagoya",dept:"大学院工学研究科",major:"エネルギー理工学系（エネルギー理工学 / 総合エネルギー工学）",
   keywords:["エネルギー","原子力","核融合","プラズマ","材料科学","エネルギー工学","量子ビーム","energy","nuclear","plasma","fusion","quantum beam"],
   zhKeywords:["能源","原子力","核聚变","等离子体","材料科学","能源工学","量子束","核工程"],
   exam:"2026年8月18-20日",apply:"2026年7月3日締切（Web出願）",capacity:"36名（2専攻合計）",
   langJP:true,langEN:false,englishMin:null,ieltsOK:false,toeflOK:true,
   notes:"TOEIC/TOEFL提出（IELTS不可）。基礎：数学2問＋物理2問＋化学1問（全5問解答）。専門：エネルギー総合問題（小論文含む、必答）＋材料科学/原子核工学/機械工学/電気工学から1問选択。",
   url:"https://www.energy.nagoya-u.ac.jp/admission"},
  {id:"nagoya-civil",univ:"名古屋大学",univKey:"nagoya",dept:"大学院工学研究科",major:"土木工学系（土木工学）",
   keywords:["土木","構造工学","海岸","海洋","地盤工学","防災","社会基盤","水質","都市計画","civil","structural","coastal","geotechnical","disaster","infrastructure"],
   zhKeywords:["土木","结构工学","海岸海洋","地基工学","防灾","社会基础","水质","都市规划","土木工程","基础设施"],
   exam:"2026年8月18-20日",apply:"2026年7月3日締切（Web出願）",capacity:"36名",
   langJP:true,langEN:false,englishMin:null,ieltsOK:false,toeflOK:true,
   notes:"TOEIC/TOEFL提出（IELTS不可）。基礎：応用数学＋小論文。専門：土木系（構造/流体水理/土質/土木計画）と土木系以外の2区分で試験実施（詳細は専攻案内参照）。",
   url:"https://www.civil.nagoya-u.ac.jp/admission/examination.html"}
];

let currentResults=[], openCards=new Set();
let univState={hoku:true,osaka:true,nagoya:true};
let pillState={toefl:true,ielts:true};
let thresholdState='any', filterNoJP=false;

document.addEventListener('DOMContentLoaded',()=>{
  const n=DB.length;
  document.getElementById('totalCount').textContent=n;
  document.getElementById('emptyTotal').textContent=n;
  document.getElementById('filterNoJP').addEventListener('change',function(){filterNoJP=this.checked;applyFilters();});
});

function calcScore(item,query){
  const q=query.toLowerCase();
  const tokens=q.split(/[\s,、，\/・]+/).filter(t=>t.length>0);
  let s=0;
  tokens.forEach(t=>{
    item.keywords.forEach(k=>{const kl=k.toLowerCase();if(kl===t)s+=20;else if(kl.includes(t)||t.includes(kl))s+=10;});
    item.zhKeywords.forEach(k=>{if(k===t)s+=22;else if(k.includes(t)||t.includes(k))s+=13;});
    if(item.major.toLowerCase().includes(t))s+=8;
  });
  return s;
}

function doSearch(){
  const q=document.getElementById('queryInput').value.trim();
  if(!q){document.getElementById('resultsList').innerHTML='<div class="empty">请输入专业关键词</div>';document.getElementById('countBadge').textContent='请输入关键词';return;}
  document.getElementById('loadingRow').classList.add('show');
  setTimeout(()=>{
    currentResults=DB.map(item=>({...item,_score:calcScore(item,q)})).filter(r=>r._score>0).sort((a,b)=>b._score-a._score);
    document.getElementById('loadingRow').classList.remove('show');
    applyFilters();
  },500);
}

function applyFilters(){
  let list=currentResults.length>0?[...currentResults]:DB.map(r=>({...r,_score:5}));
  list=list.filter(r=>univState[r.univKey]);
  if(filterNoJP)list=list.filter(r=>!r.langJP);
  if(thresholdState==='461')list=list.filter(r=>!r.englishMin||r.englishMin<=460);
  if(thresholdState==='550')list=list.filter(r=>!r.englishMin||r.englishMin<=549);
  render(list);
}

function render(list){
  const el=document.getElementById('resultsList');
  document.getElementById('countBadge').textContent=list.length+' 个专攻';
  if(!list.length){el.innerHTML='<div class="empty">暂无匹配结果<br><span style="font-size:13px;">请尝试调整筛选条件或更换关键词</span></div>';return;}
  const maxScore=Math.max(...list.map(r=>r._score),1);
  const bMap={hoku:['北海道','badge-hoku'],osaka:['大阪','badge-osaka'],nagoya:['名古屋','badge-nagoya']};
  el.innerHTML=list.map((r,i)=>{
    const rel=Math.round((r._score/maxScore)*100);
    const rClass=rel>=65?'rel-high':rel>=35?'rel-mid':'rel-low';
    const rLabel=rel>=65?'高度相关':rel>=35?'相关':'参考';
    const topClass=(i<3&&r._score>0)?' top-match':'';
    const [bName,bClass]=bMap[r.univKey]||['',''];
    const jpTag=r.langJP?'<span class="ctag ctag-jp">需日语</span>':'';
    const minTag=r.englishMin?`<span class="ctag ctag-warn">TOEIC≥${r.englishMin}</span>`:'<span class="ctag ctag-ok">无英语门槛</span>';
    const ieltsTag=!r.ieltsOK?'<span class="ctag ctag-ng">IELTS不可</span>':'<span class="ctag ctag-ok">IELTS可</span>';
    const alertTag=r.univKey==='osaka'?'<span class="ctag ctag-alert">留学ビザ不可</span>':'';
    const isOpen=openCards.has(r.id);
    return `<div class="result-card${topClass} univ-${r.univKey}" onclick="toggleCard('${r.id}')">
  <div class="card-head">
    <div>
      <div class="card-major">${r.major}</div>
      <div class="card-univ">${r.univ}<span class="card-univ-badge ${bClass}">${bName}</span> &nbsp;${r.dept}</div>
    </div>
    <span class="relevance-badge ${rClass}">${rLabel}</span>
  </div>
  <div class="card-tags">${jpTag}${minTag}${ieltsTag}${alertTag}</div>
  <div class="card-meta">
    <span><strong>出愿：</strong>${r.apply}</span>
    <span><strong>考试：</strong>${r.exam}</span>
    <span><strong>募集：</strong>${r.capacity}</span>
  </div>
  <div class="detail-drawer ${isOpen?'open':''}" id="dd-${r.id}">
    <div class="detail-inner">
      <div class="detail-row"><span class="detail-key">注意事项</span><span class="detail-val">${r.notes}</span></div>
      <div class="detail-row"><span class="detail-key">官方链接</span><span class="detail-val"><a href="${r.url}" target="_blank" rel="noopener">${r.url}</a></span></div>
    </div>
  </div>
</div>`;
  }).join('');
}

function toggleCard(id){if(openCards.has(id))openCards.delete(id);else openCards.add(id);const dd=document.getElementById('dd-'+id);if(dd)dd.classList.toggle('open',openCards.has(id));}
function qs(q){document.getElementById('queryInput').value=q;doSearch();}
function resetAll(){
  document.getElementById('queryInput').value='';
  document.getElementById('filterNoJP').checked=false;
  filterNoJP=false;univState={hoku:true,osaka:true,nagoya:true};pillState={toefl:true,ielts:true};thresholdState='any';
  currentResults=[];openCards.clear();syncUI();
  document.getElementById('resultsList').innerHTML=`<div class="empty">输入专业关键词，点击「✦ AI 推荐」开始搜索<br><span style="font-size:13px;color:#b8b4cc;">覆盖北海道大学・大阪大学・名古屋大学，共 ${DB.length} 个专攻</span></div>`;
  document.getElementById('countBadge').textContent='请输入关键词';
}
function toggleUniv(key){const active=Object.values(univState).filter(Boolean).length;if(univState[key]&&active===1)return;univState[key]=!univState[key];syncUI();applyFilters();}
function tp(key){pillState[key]=!pillState[key];document.getElementById('p-'+key).classList.toggle('on',pillState[key]);applyFilters();}
function th(val){thresholdState=thresholdState===val?'any':val;syncUI();applyFilters();}
function syncUI(){
  ['hoku','osaka','nagoya'].forEach(k=>{document.getElementById('t-'+k).className='univ-tab'+(univState[k]?` on-${k}`:'');});
  ['toefl','ielts'].forEach(k=>{document.getElementById('p-'+k).classList.toggle('on',pillState[k]);});
  ['any','461','550'].forEach(v=>{const el=document.getElementById('p-'+v);const on=thresholdState===v;el.className='pill'+(on?(v==='any'?' on-teal':' on'):'');});
}
</script>
</body>
</html>
