<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>九州大学 募集要项与专业信息</title>
<link rel="stylesheet" href="../assets/styles.css" />
</head>
<body>
<div class="page">
  <div class="hero">
    <h1>院校募集要项</h1>
    <p>输入专业方向后，系统会把所有有关联的研究科和专业方向逐条推荐出来；也可以继续按学校查看全量信息。筛选条件已根据本地 PDF 重新复核，拆成 <strong>面试可英语</strong>、<strong>需提交英语成绩</strong>、<strong>需提交日语成绩</strong>。</p>
    <p><a href="../index.html">返回首页</a></p>
  </div>

  <div class="stats">
    <div class="stat">院校 <strong id="schoolCount">0</strong> 所</div>
    <div class="stat">项目 <strong id="itemCount">0</strong> 条</div>
    <div class="stat">官方入口 <strong id="pdfCount">0</strong> 个</div>
    <div class="stat">资料目录 <strong>全专业募集要项</strong></div>
  </div>

  <div class="panel">
    <div class="search-row">
      <input id="searchInput" type="text" placeholder="输入专业：机械 / 材料 / 电气电子 / 情报工学 / AI / 数据科学 / 建筑 / 土木 / 半导体" />
      <button class="primary-btn" id="searchBtn">搜索</button>
      <button class="secondary-btn" id="resetBtn">重置</button>
    </div>

    <div class="section-title">快速搜索</div>
    <div class="row" id="quickRow"></div>

    <div class="section-title" style="margin-top:16px;">院校</div>
    <div class="row" id="schoolTabs"></div>

    <div class="section-title" style="margin-top:16px;">筛选条件</div>
    <div class="row">
      <span class="chip" data-filter="interviewEnglish">面试可英语</span>
      <span class="chip" data-filter="englishScore">需提交英语成绩</span>
      <span class="chip" data-filter="japaneseScore">需提交日语成绩</span>
    </div>

    <div class="hint">说明：专业搜索会展开到具体方向层级；筛选里的“成绩”指需要提交外部考试或能力证明，不等同于日语授课/日语面试能力。</div>
  </div>

  <div class="results-head">
    <h2>检索结果</h2>
    <span class="badge" id="resultCount">0 条</span>
  </div>

  <div class="result-list" id="resultList"></div>
</div>

<div class="modal-backdrop" id="schoolModal" aria-hidden="true">
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-head">
      <div>
        <h3 id="modalTitle"></h3>
        <p id="modalSubtitle"></p>
      </div>
      <button class="close-btn" id="modalClose" aria-label="关闭">×</button>
    </div>
    <div class="modal-search">
      <input id="modalSearchInput" type="text" placeholder="在这所学校内搜索专业：法学 / 机械 / 经济 / TOEFL" />
      <button class="secondary-btn" id="modalSearchReset">清空</button>
    </div>
    <div id="modalResources"></div>
    <div id="modalBody"></div>
  </div>
</div>
<script src="../assets/schools/kyushu-data.js"></script>
<script src="../assets/app.js"></script>
</body>
</html>
